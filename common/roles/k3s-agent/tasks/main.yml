---
- name: Validate agent join parameters
  ansible.builtin.assert:
    that:
      - k3s_server_url | length > 0
      - k3s_node_token | length > 0
    fail_msg: >-
      k3s-agent requires k3s_server_url and k3s_node_token. The cluster
      playbook normally sets these from the k3s_server host's facts —
      run the server play first or set the variables manually.

- name: Fetch upstream k3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /usr/local/bin/k3s-install.sh
    mode: "0755"
    force: true

- name: Run k3s installer (agent mode, idempotent upgrade-in-place)
  ansible.builtin.command: /usr/local/bin/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "agent {{ k3s_agent_extra_args }}"
    K3S_URL: "{{ k3s_server_url }}"
    K3S_TOKEN: "{{ k3s_node_token }}"
  register: _k3s_agent_install
  changed_when: "'No change detected' not in _k3s_agent_install.stdout
                  and 'No change detected' not in _k3s_agent_install.stderr"
  no_log: true

- name: Ensure k3s agent is enabled + running
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
