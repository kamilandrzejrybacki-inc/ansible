# audiorelay-setup/roles/audiorelay/defaults/main.yml
---
audiorelay_wireplumber_config_dir: "{{ ansible_env.HOME }}/.config/wireplumber/wireplumber.conf.d"

audiorelay_packages:
  - pulseaudio
  - pavucontrol
  - wget

audiorelay_pulse_module_sink: >-
  load-module module-null-sink
  sink_name={{ audiorelay_virtual_sink_name }}
  sink_properties=device.description=Virtual-Mic-Sink

audiorelay_pulse_module_source: >-
  load-module module-remap-source
  master={{ audiorelay_virtual_sink_name }}.monitor
  source_name={{ audiorelay_virtual_source_name }}
  source_properties=device.description=Virtual-Mic
