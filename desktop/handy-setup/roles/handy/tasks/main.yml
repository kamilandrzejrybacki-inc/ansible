# handy-setup/roles/handy/tasks/main.yml
---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install common dependencies
  ansible.builtin.apt:
    name: "{{ handy_common_packages }}"
    state: present
  become: true

- name: Install X11 text input tools
  ansible.builtin.apt:
    name: "{{ handy_x11_packages }}"
    state: present
  become: true
  when: handy_display_server == "x11"

- name: Install Wayland text input tools
  ansible.builtin.apt:
    name: "{{ handy_wayland_packages }}"
    state: present
  become: true
  when: handy_display_server == "wayland"

- name: Check if Handy is already installed
  ansible.builtin.command: which handy.real
  register: handy_check
  changed_when: false
  failed_when: false

- name: Create download directory
  ansible.builtin.file:
    path: "{{ handy_download_dir }}"
    state: directory
    mode: "0755"
  when: handy_check.rc != 0

# --- .deb installation ---

- name: Download Handy .deb package
  ansible.builtin.get_url:
    url: "{{ handy_deb_url }}"
    dest: "{{ handy_download_dir }}/{{ handy_deb_filename }}"
    mode: "0644"
  when:
    - handy_check.rc != 0
    - handy_install_method == "deb"

- name: Install Handy .deb package
  ansible.builtin.apt:
    deb: "{{ handy_download_dir }}/{{ handy_deb_filename }}"
    state: present
  become: true
  when:
    - handy_check.rc != 0
    - handy_install_method == "deb"

# --- AppImage installation ---

- name: Create AppImage directory
  ansible.builtin.file:
    path: "{{ handy_appimage_dir }}"
    state: directory
    mode: "0755"
  become: true
  when:
    - handy_check.rc != 0
    - handy_install_method == "appimage"

- name: Download Handy AppImage
  ansible.builtin.get_url:
    url: "{{ handy_appimage_url }}"
    dest: "{{ handy_appimage_dir }}/{{ handy_appimage_filename }}"
    mode: "0755"
  become: true
  when:
    - handy_check.rc != 0
    - handy_install_method == "appimage"

# --- Cleanup ---

- name: Remove download directory
  ansible.builtin.file:
    path: "{{ handy_download_dir }}"
    state: absent
  when: handy_check.rc != 0

# --- Wrapper: shadow /usr/bin/handy so settings are always patched ---

- name: Check if real Handy binary exists
  ansible.builtin.stat:
    path: "{{ handy_real_binary }}"
  register: handy_real_stat

- name: Rename Handy binary to handy.real (one-time)
  ansible.builtin.command: mv /usr/bin/handy "{{ handy_real_binary }}"
  become: true
  when:
    - not handy_real_stat.stat.exists
    - handy_install_method == "deb"

- name: Install Handy settings wrapper
  ansible.builtin.template:
    src: handy-wrapper.sh.j2
    dest: "{{ handy_wrapper_path }}"
    mode: "0755"
  become: true

# --- Model predownload ---

- name: Create models directory
  ansible.builtin.file:
    path: "{{ handy_models_dir }}"
    state: directory
    mode: "0755"
  when: handy_model != "none"

- name: Set selected model info
  ansible.builtin.set_fact:
    handy_selected_model: "{{ handy_model_catalog[handy_model] }}"
  when: handy_model != "none"

- name: Check if model already exists (Whisper)
  ansible.builtin.stat:
    path: "{{ handy_models_dir }}/{{ handy_selected_model.filename }}"
  register: model_file
  when:
    - handy_model != "none"
    - handy_selected_model.type == "whisper"

- name: Check if model already exists (Parakeet)
  ansible.builtin.stat:
    path: "{{ handy_models_dir }}/{{ handy_selected_model.filename | regex_replace('\\.tar\\.gz$', '') }}"
  register: parakeet_dir
  when:
    - handy_model != "none"
    - handy_selected_model.type == "parakeet"

- name: Download Whisper model
  ansible.builtin.get_url:
    url: "{{ handy_selected_model.url }}"
    dest: "{{ handy_models_dir }}/{{ handy_selected_model.filename }}"
    mode: "0644"
  when:
    - handy_model != "none"
    - handy_selected_model.type == "whisper"
    - not model_file.stat.exists

- name: Download Parakeet model archive
  ansible.builtin.get_url:
    url: "{{ handy_selected_model.url }}"
    dest: "/tmp/{{ handy_selected_model.filename }}"
    mode: "0644"
  when:
    - handy_model != "none"
    - handy_selected_model.type == "parakeet"
    - not parakeet_dir.stat.exists

- name: Extract Parakeet model
  ansible.builtin.unarchive:
    src: "/tmp/{{ handy_selected_model.filename }}"
    dest: "{{ handy_models_dir }}"
    remote_src: true
  when:
    - handy_model != "none"
    - handy_selected_model.type == "parakeet"
    - not parakeet_dir.stat.exists

- name: Remove Parakeet archive
  ansible.builtin.file:
    path: "/tmp/{{ handy_selected_model.filename }}"
    state: absent
  when:
    - handy_model != "none"
    - handy_selected_model.type == "parakeet"
    - not parakeet_dir.stat.exists

# --- Desktop shortcut ---

- name: Ensure applications directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/share/applications"
    state: directory
    mode: "0755"
  when: handy_shortcut == "yes"

- name: Create desktop shortcut
  ansible.builtin.copy:
    dest: "{{ handy_desktop_file }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Name=Handy
      Comment=Speech-to-text dictation
      Exec={{ handy_wrapper_path }}
      Terminal=false
      Type=Application
      Categories=Utility;Audio;Accessibility;
      Keywords=speech;voice;dictation;transcription;whisper;
      StartupNotify=true
  when: handy_shortcut == "yes"

- name: Ensure autostart directory exists
  ansible.builtin.file:
    path: "{{ handy_autostart_dir }}"
    state: directory
    mode: "0755"
  when: handy_autostart == "yes"

- name: Enable autostart on login
  ansible.builtin.copy:
    src: "{{ handy_desktop_file }}"
    dest: "{{ handy_autostart_dir }}/handy.desktop"
    remote_src: true
    mode: "0644"
  when:
    - handy_autostart == "yes"
    - handy_shortcut == "yes"

- name: Display post-setup instructions
  ansible.builtin.debug:
    msg: |
      ══════════════════════════════════════════════
        Handy setup complete!
      ══════════════════════════════════════════════

      Shortcut : {{ handy_shortcut_key }}
      Model    : {{ handy_model }}
      Mic      : {{ handy_microphone if handy_microphone else 'system default' }}

      Hold the shortcut to record, release to transcribe.
      The overlay bar appears at the bottom while recording.
