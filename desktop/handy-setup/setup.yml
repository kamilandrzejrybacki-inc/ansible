# handy-setup/setup.yml
---
- name: Handy speech-to-text setup
  hosts: local
  vars_prompt:
    - name: handy_install_method
      prompt: |-

        ══════════════════════════════════════════════
          Handy Speech-to-Text Setup
        ══════════════════════════════════════════════

        Installation method
          deb      - Debian package (recommended for Ubuntu/Debian)
          appimage - Portable AppImage binary
        Choose [deb/appimage]
      default: "deb"
      private: false

    - name: handy_display_server
      prompt: |-
        Display server
          x11     - X11 / Xorg (installs xdotool)
          wayland - Wayland (installs wtype)
        Choose [x11/wayland]
      default: "x11"
      private: false

    - name: handy_model
      prompt: |-
        Speech recognition model
          none           - Skip (select later from Handy UI)
          whisper-small  - Whisper Small  (~487 MB, fast, lower accuracy)
          whisper-medium - Whisper Medium (~492 MB, balanced)
          whisper-turbo  - Whisper Turbo  (~1.6 GB, fast + accurate, needs GPU)
          whisper-large  - Whisper Large  (~1.1 GB, best accuracy, needs GPU)
          parakeet-v2    - Parakeet V2    (~473 MB, CPU-only, good speed)
          parakeet-v3    - Parakeet V3    (~478 MB, CPU-only, auto language detection)
        Choose model name
      default: "none"
      private: false

    - name: handy_shortcut_key
      prompt: |-
        Transcription hotkey (hold to record, release to transcribe)
        Examples: ctrl+space, super+grave, ctrl+shift+r
        Choose shortcut
      default: "ctrl+space"
      private: false

    - name: handy_shortcut
      prompt: "Create desktop application shortcut? [yes/no]"
      default: "yes"
      private: false

    - name: handy_autostart
      prompt: "Start Handy automatically on login? [yes/no]"
      default: "no"
      private: false

  pre_tasks:
    - name: Gather available audio input sources
      ansible.builtin.shell: |
        set -o pipefail
        pactl list sources short \
          | awk '{print NR". "$2}' \
          | grep -v '\.monitor$'
      register: handy_audio_sources
      changed_when: false
      failed_when: false
      become: false

    - name: Display available microphone sources
      ansible.builtin.debug:
        msg: |
          ──────────────────────────────────────────────
          Available microphone sources:
          {{ handy_audio_sources.stdout }}

          (tip: run  pactl list sources short  for details)
          ──────────────────────────────────────────────

    - name: Prompt for microphone source
      ansible.builtin.pause:
        prompt: "Enter the microphone source name to use (or leave blank to use system default)"
      register: handy_mic_prompt

    - name: Set microphone variable
      ansible.builtin.set_fact:
        handy_microphone: "{{ handy_mic_prompt.user_input | trim }}"

  roles:
    - handy
