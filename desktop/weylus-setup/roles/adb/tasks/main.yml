# weylus-setup/roles/adb/tasks/main.yml
---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install adb packages
  ansible.builtin.apt:
    name: "{{ adb_packages }}"
    state: present
  become: true

- name: Start adb server
  ansible.builtin.command: adb start-server
  changed_when: true
  become: false

- name: Check for connected devices
  ansible.builtin.command: adb devices -l
  register: adb_devices
  changed_when: false
  become: false

- name: Display connected devices
  ansible.builtin.debug:
    msg: "{{ adb_devices.stdout_lines }}"
