---
- name: Ensure Claude config directory exists
  ansible.builtin.file:
    path: "{{ claude_config_dir }}"
    state: directory
    mode: "0755"

- name: Check for existing settings.json
  ansible.builtin.stat:
    path: "{{ claude_config_dir }}/settings.json"
  register: existing_settings

- name: Back up existing settings.json
  ansible.builtin.copy:
    src: "{{ claude_config_dir }}/settings.json"
    dest: "{{ claude_config_dir }}/settings.json.bak.{{ ansible_date_time.epoch }}"
    remote_src: true
    mode: "0644"
  when:
    - existing_settings.stat.exists
    - not existing_settings.stat.islnk

- name: Copy settings.json
  ansible.builtin.copy:
    src: claude/settings.json
    dest: "{{ claude_config_dir }}/settings.json"
    mode: "0644"

- name: Copy top-level markdown (CLAUDE.md, RTK.md)
  ansible.builtin.copy:
    src: "claude/{{ item }}"
    dest: "{{ claude_config_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - CLAUDE.md
    - RTK.md

- name: Copy rules directory
  ansible.builtin.copy:
    src: claude/rules/
    dest: "{{ claude_config_dir }}/rules/"
    mode: "0644"
    directory_mode: "0755"

- name: Ensure hooks directory exists
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/hooks"
    state: directory
    mode: "0755"

- name: Ensure skills plugin cache dirs exist
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/plugins/cache/{{ item.name }}"
    state: directory
    mode: "0755"
  loop: "{{ claude_skills_repos }}"

- name: Clone skill repos into plugin cache
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ claude_config_dir }}/plugins/cache/{{ item.name }}"
    version: main
    depth: 1
    update: true
  loop: "{{ claude_skills_repos }}"

- name: Ensure skills directory exists
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/skills"
    state: directory
    mode: "0755"

- name: Link skills from repos into ~/.claude/skills
  ansible.builtin.shell:
    cmd: >
      find "{{ claude_config_dir }}/plugins/cache/{{ item.name }}/skills"
      -name SKILL.md -not -path '*/node_modules/*' -print0 |
      while IFS= read -r -d '' skill_md; do
        src="$(dirname "$skill_md")"
        name="$(basename "$src")"
        excluded="{{ claude_skills_excluded | join(' ') }}"
        if echo "$excluded" | grep -qw "$name"; then
          continue
        fi
        target="{{ claude_config_dir }}/skills/$name"
        ln -sfn "$src" "$target"
      done
    executable: /bin/bash
  loop: "{{ claude_skills_repos }}"
  changed_when: true

- name: Remove excluded mattpocock skill symlinks
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/skills/{{ item }}"
    state: absent
  loop: "{{ claude_skills_excluded }}"

- name: Prune irrelevant ECC marketplace skills
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/plugins/marketplaces/everything-claude-code/skills/{{ item }}"
    state: absent
  loop: "{{ claude_ecc_skills_pruned }}"
