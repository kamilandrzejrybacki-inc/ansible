---
- name: Ensure Claude config directory exists
  ansible.builtin.file:
    path: "{{ claude_config_dir }}"
    state: directory
    mode: "0755"

- name: Check for existing settings.json
  ansible.builtin.stat:
    path: "{{ claude_config_dir }}/settings.json"
  register: existing_settings

- name: Back up existing settings.json
  ansible.builtin.copy:
    src: "{{ claude_config_dir }}/settings.json"
    dest: "{{ claude_config_dir }}/settings.json.bak.{{ ansible_date_time.epoch }}"
    remote_src: true
    mode: "0644"
  when:
    - existing_settings.stat.exists
    - not existing_settings.stat.islnk

- name: Copy settings.json
  ansible.builtin.copy:
    src: claude/settings.json
    dest: "{{ claude_config_dir }}/settings.json"
    mode: "0644"

- name: Copy top-level markdown (CLAUDE.md, RTK.md)
  ansible.builtin.copy:
    src: "claude/{{ item }}"
    dest: "{{ claude_config_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - CLAUDE.md
    - RTK.md

# Codex / OpenCode / Gemini-CLI read AGENTS.md from $HOME and ~/.codex.
# Use the same content as CLAUDE.md so all agentic tools follow the
# Cellarette-first policy.
- name: Ensure ~/.codex exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.codex"
    state: directory
    mode: "0755"

- name: Deploy AGENTS.md (shared by Codex, OpenCode, Gemini CLI)
  ansible.builtin.copy:
    src: "claude/AGENTS.md"
    dest: "{{ item }}"
    mode: "0644"
  loop:
    - "{{ ansible_env.HOME }}/AGENTS.md"
    - "{{ ansible_env.HOME }}/.codex/AGENTS.md"

# ccstatusline — Claude Code status-line plugin. Settings file holds user's
# preferred blocks/colors/layout. Idempotent: ansible copy compares content.
- name: Ensure ~/.config/ccstatusline exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/ccstatusline"
    state: directory
    mode: "0755"

- name: Deploy ccstatusline settings (shared visual config)
  ansible.builtin.copy:
    src: "claude/ccstatusline-settings.json"
    dest: "{{ ansible_env.HOME }}/.config/ccstatusline/settings.json"
    mode: "0644"

- name: Copy rules directory
  ansible.builtin.copy:
    src: claude/rules/
    dest: "{{ claude_config_dir }}/rules/"
    mode: "0644"
    directory_mode: "0755"

# Vendored, repo-local skills (e.g. the thermo-nuclear code-quality-review
# standard). Copied directly rather than cloned, since they live in this
# repo instead of an upstream skill repo. CLAUDE.md makes the review skill
# the default standard for every review.
- name: Copy vendored skills directory
  ansible.builtin.copy:
    src: claude/skills/
    dest: "{{ claude_config_dir }}/skills/"
    mode: "0644"
    directory_mode: "0755"

- name: Ensure hooks directory exists
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/hooks"
    state: directory
    mode: "0755"

- name: Ensure skills plugin cache dirs exist
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/plugins/cache/{{ item.name }}"
    state: directory
    mode: "0755"
  loop: "{{ claude_skills_repos }}"

- name: Clone skill repos into plugin cache
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ claude_config_dir }}/plugins/cache/{{ item.name }}"
    version: main
    depth: 1
    update: true
  loop: "{{ claude_skills_repos }}"

- name: Ensure skills directory exists
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/skills"
    state: directory
    mode: "0755"

- name: Link skills from repos into ~/.claude/skills
  ansible.builtin.shell:
    cmd: >
      find "{{ claude_config_dir }}/plugins/cache/{{ item.name }}/skills"
      -name SKILL.md -not -path '*/node_modules/*' -print0 |
      while IFS= read -r -d '' skill_md; do
        src="$(dirname "$skill_md")"
        name="$(basename "$src")"
        excluded="{{ claude_skills_excluded | join(' ') }}"
        if echo "$excluded" | grep -qw "$name"; then
          continue
        fi
        target="{{ claude_config_dir }}/skills/$name"
        ln -sfn "$src" "$target"
      done
    executable: /bin/bash
  loop: "{{ claude_skills_repos }}"
  changed_when: true

- name: Remove excluded mattpocock skill symlinks
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/skills/{{ item }}"
    state: absent
  loop: "{{ claude_skills_excluded }}"

- name: Prune irrelevant ECC marketplace skills
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/plugins/marketplaces/everything-claude-code/skills/{{ item }}"
    state: absent
  loop: "{{ claude_ecc_skills_pruned }}"

# gh-axi: pinned AXI/TOON wrapper over the gh CLI. User-prefix install (no sudo,
# no second GitHub credential — reuses existing `gh` auth). The gh-axi skill is
# delivered by the "Copy vendored skills directory" task above.
- name: Install gh-axi (pinned) to the user-local prefix
  ansible.builtin.command:
    cmd: "npm install -g gh-axi@{{ gh_axi_version }} --prefix {{ ansible_env.HOME }}/.local"
  register: gh_axi_install
  changed_when: >-
    'added' in gh_axi_install.stdout or 'changed' in gh_axi_install.stdout
    or 'updated' in gh_axi_install.stdout

- name: Verify gh-axi version is the pinned one
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/gh-axi --version"
  register: gh_axi_version_out
  changed_when: false
  failed_when: gh_axi_version not in gh_axi_version_out.stdout

# no-mistakes: pinned Go binary → ~/.local/bin (needs the Go toolchain). Only opens
# PRs, never merges; run with NO_MISTAKES_TELEMETRY=off. Skipped if `go` is absent.
- name: Check for Go toolchain (no-mistakes install prerequisite)
  ansible.builtin.command: go version
  register: go_present
  changed_when: false
  failed_when: false

- name: Install no-mistakes gate (pinned) to ~/.local/bin
  ansible.builtin.command:
    cmd: "go install github.com/kunchenguid/no-mistakes/cmd/no-mistakes@v{{ no_mistakes_version }}"
  environment:
    GOBIN: "{{ ansible_env.HOME }}/.local/bin"
    NO_MISTAKES_TELEMETRY: "off"
  register: nm_install
  changed_when: true
  when: go_present.rc == 0

- name: Verify no-mistakes version is the pinned one
  ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/no-mistakes --version"
  register: nm_version_out
  changed_when: false
  failed_when: no_mistakes_version not in nm_version_out.stdout
  when: go_present.rc == 0

- name: Warn if Go toolchain is missing (no-mistakes not installed)
  ansible.builtin.debug:
    msg: "Go toolchain not found — skipped no-mistakes install. Install Go >= 1.25, then re-run."
  when: go_present.rc != 0
