---
claude_mcp_servers:
  - name: "claude.ai Gmail"
    transport: http
    url: "https://gmail.mcp.claude.com/mcp"
    scope: user
  - name: "claude.ai Google Calendar"
    transport: http
    url: "https://gcal.mcp.claude.com/mcp"
    scope: user
  - name: "lightpanda"
    transport: stdio
    scope: user
    command: docker
    args:
      - exec
      - -i
      - lightpanda
      - /bin/lightpanda
      - mcp
