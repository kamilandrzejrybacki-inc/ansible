---
# Skip MCP servers flagged requires_docker (e.g. when running inside k8s pods
# without a docker socket). Override via -e skip_docker_mcps=true.
skip_docker_mcps: false

claude_mcp_servers:
  - name: "claude.ai Gmail"
    transport: http
    url: "https://gmail.mcp.claude.com/mcp"
    scope: user
  - name: "claude.ai Google Calendar"
    transport: http
    url: "https://gcal.mcp.claude.com/mcp"
    scope: user
  - name: "lightpanda"
    transport: stdio
    scope: user
    command: docker
    requires_docker: true
    args:
      - exec
      - -i
      - lightpanda
      - /bin/lightpanda
      - mcp
