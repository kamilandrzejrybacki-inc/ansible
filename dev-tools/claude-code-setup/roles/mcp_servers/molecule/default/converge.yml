---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Create mock claude CLI
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          echo "mock claude: $@"
        dest: /usr/local/bin/claude
        mode: "0755"
  tasks:
    - name: Include mcp_servers role tasks
      ansible.builtin.include_tasks:
        file: ../../tasks/main.yml
