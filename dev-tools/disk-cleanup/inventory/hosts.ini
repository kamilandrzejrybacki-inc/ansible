# Host(s) that get the daily reclaimable-only disk-cleanup cron.
# The cleanup is user-level (user crontab + ~/.local/bin), so it runs as the
# login user over a local connection — no SSH, no become.
[disk_cleanup_hosts]
localhost ansible_connection=local

[disk_cleanup_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
