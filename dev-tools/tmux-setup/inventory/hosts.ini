# Hosts that Termix connects to via SSH. Auto-Tmux (per-host toggle in Termix)
# runs `tmux attach || tmux new` on connect, keeping the remote shell — and any
# running agent — alive across browser disconnects. That requires tmux installed
# on each of these targets, which this playbook ensures.
#
# lw-main is the edge/deploy box itself → local connection (no SSH to self).
[tmux_hosts]
lw-main ansible_connection=local
lw-c1   ansible_host=192.168.0.107 ansible_user=kamil
lw-c2   ansible_host=192.168.0.240 ansible_user=kamil
lw-c3   ansible_host=192.168.0.108 ansible_user=kamil
lw-nas  ansible_host=192.168.0.115 ansible_user=kamil
lw-pi   ansible_host=192.168.0.109 ansible_user=kamil

[tmux_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=/home/kamil-rybacki/.ssh/id_ed25519
