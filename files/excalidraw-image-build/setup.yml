# files/excalidraw-image-build/setup.yml
#
# Build the patched Excalidraw frontend image and push it to the k3s
# in-cluster registry on lw-c1 (:30500). The helm chart `excalidraw`
# pulls from `192.168.0.107:30500/excalidraw-patched:latest`.
#
# Run on lw-main (or anywhere with docker + reachability to :30500):
#   ansible-playbook files/excalidraw-image-build/setup.yml \
#     -i files/excalidraw-image-build/inventory/hosts.ini
---
- name: Build + push patched Excalidraw image
  hosts: builder
  gather_facts: false
  vars:
    excalidraw_build_context: "/tmp/excalidraw-image-build"
    excalidraw_registry: "192.168.0.107:30500"
    excalidraw_image_name: "excalidraw-patched"
    excalidraw_image_tag: "latest"
    excalidraw_source_files_dir: >-
      {{ playbook_dir }}/../excalidraw-setup/roles/excalidraw/files
  tasks:
    - name: Ensure build context dir exists
      ansible.builtin.file:
        path: "{{ excalidraw_build_context }}"
        state: directory
        mode: "0755"

    - name: Copy Dockerfile + patch script
      ansible.builtin.copy:
        src: "{{ excalidraw_source_files_dir }}/{{ item }}"
        dest: "{{ excalidraw_build_context }}/{{ item }}"
        mode: "0755"
      loop:
        - Dockerfile
        - patch-and-start.sh

    - name: Build patched Excalidraw image
      community.docker.docker_image:
        name: "{{ excalidraw_registry }}/{{ excalidraw_image_name }}"
        tag: "{{ excalidraw_image_tag }}"
        source: build
        build:
          path: "{{ excalidraw_build_context }}"
          pull: true
        force_source: true
        state: present

    - name: Push image to in-cluster registry
      community.docker.docker_image:
        name: "{{ excalidraw_registry }}/{{ excalidraw_image_name }}"
        tag: "{{ excalidraw_image_tag }}"
        push: true
        source: local
