---
# -- Excalidraw frontend -------------------------------------------------------
excalidraw_container_name: excalidraw
excalidraw_image: "excalidraw-patched:local"
excalidraw_port: 8083
excalidraw_restart_policy: unless-stopped
excalidraw_health_check_retries: 12
excalidraw_health_check_delay: 5

# Public URL injected as BACKEND_URL — startup script replaces json.excalidraw.com in bundle
excalidraw_frontend_url: "https://excalidraw.kamilandrzejrybacki.dpdns.org"

# -- Storage backend (alswl/excalidraw-storage-backend) -----------------------
excalidraw_storage_container_name: excalidraw-storage
excalidraw_storage_image: "alswl/excalidraw-storage-backend:v2023.11.11"
excalidraw_storage_port: 3002

# -- Redis (Keyv backing store for the storage backend) -----------------------
excalidraw_redis_container_name: excalidraw-redis
excalidraw_redis_image: "redis:7-alpine"
excalidraw_redis_data_dir: "/opt/excalidraw/redis"

# -- Docker network -----------------------------------------------------------
excalidraw_network: "excalidraw-net"
