---
- name: Converge
  hosts: all
  become: true
  vars_files:
    - vars/test-vars.yml
  pre_tasks:
    - name: Install pip
      ansible.builtin.apt:
        name: python3-pip
        state: present
        update_cache: true
    - name: Install Docker SDK for Python
      ansible.builtin.pip:
        name: docker
        state: present
  roles:
    - role: kuma
