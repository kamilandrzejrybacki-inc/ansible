---
# =============================================================================
# Vaultwarden Setup
# =============================================================================
# Deploys Vaultwarden (self-hosted Bitwarden) on a remote host via Docker.
#
# Usage:
#   ansible-playbook home-services/vaultwarden-setup/setup.yml \
#     -i home-services/vaultwarden-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

- name: Load saved homelab configuration (if available)
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check for homelab setup vars
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      register: _homelab_vars_stat

    - name: Load homelab setup vars
      ansible.builtin.include_vars:
        file: "{{ lookup('env', 'HOME') }}/.homelab-setup-vars.yml"
      when: _homelab_vars_stat.stat.exists

- name: Gather host details
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: target_host_ip
      prompt: |

        ══════════════════════════════════════════════
          Vaultwarden Setup Wizard
        ══════════════════════════════════════════════

        [1/3] IP or hostname of the target machine
      private: false

    - name: target_ssh_user
      prompt: "[2/3] SSH user for the target machine"
      private: false

    - name: vaultwarden_admin_token
      prompt: "[3/3] Admin token for the /admin panel"
      private: true
      confirm: true

  tasks:
    - name: Add target host to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ target_host_ip }}"
        groups: vaultwarden_hosts
        ansible_user: "{{ target_ssh_user }}"
        ansible_python_interpreter: /usr/bin/python3
        vaultwarden_admin_token: "{{ vaultwarden_admin_token }}"
        vaultwarden_bind_address: "{{ '127.0.0.1' if target_host_ip in ['localhost', '127.0.0.1', '::1'] else '0.0.0.0' }}"
        vaultwarden_public_url: >-
          {{
            'https://' + vaultwarden_hostname + '.' + hostvars['localhost']['saved_domain']
            if hostvars['localhost']['_homelab_vars_stat'].stat.exists
            else ''
          }}
      no_log: true

- name: Install Docker and deploy Vaultwarden
  hosts: vaultwarden_hosts
  become: true
  roles:
    - docker
    - vaultwarden

- name: Integrate Vaultwarden with secure homelab (Caddy + Cloudflare Tunnel + Pi-hole + Homepage)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true
  vars:
    _target_host_ip: "{{ hostvars['localhost']['target_host_ip'] }}"
  tasks:
    - name: Integrate when secure homelab is configured
      when: hostvars['localhost']['_homelab_vars_stat'].stat.exists
      block:
        - name: Add Cloudflare Tunnel DNS route for Vaultwarden
          ansible.builtin.command: >
            cloudflared tunnel route dns {{ saved_cf_tunnel_name }}
            {{ vaultwarden_hostname }}.{{ saved_domain }}
          environment:
            TUNNEL_ORIGIN_CERT: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
          register: _vw_cf_dns
          changed_when: _vw_cf_dns.rc == 0
          failed_when: false
          become: false

        - name: Add Vaultwarden to Caddy config
          ansible.builtin.blockinfile:
            path: /opt/homelab/caddy/Caddyfile
            marker: "# {mark} VAULTWARDEN"
            unsafe_writes: true
            block: |
              http://{{ vaultwarden_hostname }}.{{ saved_domain }} {
                import rate_limit
                reverse_proxy http://{{ _target_host_ip }}:{{ vaultwarden_port }}
              }
          notify: reload caddy

        - name: Add Pi-hole local DNS record for Vaultwarden
          ansible.builtin.command: >
            docker exec pihole sh -c
            'grep -qF "{{ vaultwarden_hostname }}.{{ saved_domain }}" /etc/pihole/custom.list ||
             (echo "{{ ansible_default_ipv4.address }} {{ vaultwarden_hostname }}.{{ saved_domain }}" >> /etc/pihole/custom.list && echo CHANGED)'
          register: _pihole_dns
          changed_when: "'CHANGED' in _pihole_dns.stdout"

        - name: Reload Pi-hole DNS
          ansible.builtin.command: docker exec pihole pihole restartdns reload
          changed_when: true
          when: _pihole_dns.changed

        - name: Add Vaultwarden to Homepage services
          ansible.builtin.blockinfile:
            path: /opt/homelab/homepage/services.yaml
            marker: "    # {mark} VAULTWARDEN"
            insertafter: "- Applications:"
            unsafe_writes: true
            block: |2
                  - Vaultwarden:
                      icon: bitwarden.png
                      href: "https://{{ vaultwarden_hostname }}.{{ saved_domain }}"
                      description: "Password manager"

    - name: Add /etc/hosts fallback when secure homelab is not configured
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ _target_host_ip }} {{ vaultwarden_hostname }}.home"
        state: present
      when: not hostvars['localhost']['_homelab_vars_stat'].stat.exists

  handlers:
    - name: reload caddy
      ansible.builtin.shell: |
        caddy_pid=$(docker inspect --format='{{ "{{.State.Pid}}" }}' caddy)
        tee /proc/${caddy_pid}/root/etc/caddy/Caddyfile < /opt/homelab/caddy/Caddyfile > /dev/null
        docker exec caddy caddy reload --config /etc/caddy/Caddyfile
      changed_when: true
