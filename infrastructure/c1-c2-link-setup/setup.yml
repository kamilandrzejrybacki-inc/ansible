# infrastructure/c1-c2-link-setup/setup.yml
#
# Configures lw-c1 as an L3 router for its USB-ethernet direct cable
# to lw-c2.
#
# Run: ansible-playbook infrastructure/c1-c2-link-setup/setup.yml \
#        -i infrastructure/c1-c2-link-setup/inventory/hosts.ini
---
- name: Configure lw-c1 as L3 router for lw-c2 direct cable
  hosts: compute
  become: true
  gather_facts: true
  roles:
    - role: direct-link-router
      vars:
        direct_link_peer_label: "c2"
        direct_link_lan_iface: "{{ c2_link_lan_iface }}"
        direct_link_usb_iface: "{{ c2_link_usb_iface }}"
        direct_link_router_alias_ip: "{{ c2_link_router_alias_ip }}"
        direct_link_router_alias_prefix: "{{ c2_link_router_alias_prefix }}"
        direct_link_peer_ips: "{{ c2_link_reachable_ips }}"
        direct_link_iptables_chain: "FORWARD"
