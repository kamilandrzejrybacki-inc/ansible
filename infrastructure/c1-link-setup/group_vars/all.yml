---
# lw-main side (Node1)
c1_link_lan_iface: "eno1"
c1_link_usb_iface: "enx3c52a1db0e64"

# Source-binding alias on the USB-ethernet adapter.
# Must be inside the LAN /24 (lw-c1 ARPs as if on LAN) and not
# collide with any DHCP-assigned host.
c1_link_router_alias_ip: "192.168.0.250"
c1_link_router_alias_prefix: 24

# All hosts reachable through the c1 cable. Only lw-c1 itself now —
# lw-c2 was moved off the c1↔c2 daisy chain and onto the TP-Link
# switch (yellow port), so c2's traffic no longer transits this cable.
c1_link_reachable_ips:
  - "192.168.0.107"  # lw-c1
