# Cellarette pubkey distribution targets.
# All nodes get the cellarette-ssh pubkey appended to ~kamil/.ssh/authorized_keys.
# lw-main has both kamil-rybacki (admin) and kamil (operator) users; we connect
# as kamil-rybacki and write to /home/kamil via become.
[homelab]
lw-main ansible_host=192.168.0.111 ansible_user=kamil-rybacki target_user=kamil
lw-c1   ansible_host=192.168.0.107 ansible_user=kamil          target_user=kamil
lw-c2   ansible_host=192.168.0.240 ansible_user=kamil          target_user=kamil
lw-c3   ansible_host=192.168.0.108 ansible_user=kamil          target_user=kamil
lw-nas  ansible_host=192.168.0.115 ansible_user=kamil          target_user=kamil

[homelab:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=/home/kamil-rybacki/.ssh/id_ed25519
