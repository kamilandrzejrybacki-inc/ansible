---
# --- journald size cap (all hosts) -------------------------------------------
- name: Ensure journald drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: "0755"

- name: Cap journald persistent log size
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/cap.conf
    mode: "0644"
    content: |
      [Journal]
      SystemMaxUse={{ journald_max_use }}
  notify: Restart journald

# --- weekly docker prune (docker hosts only) ---------------------------------
# k3s nodes don't run dockerd; kubelet garbage-collects unused images at its
# disk threshold, so this is scoped to the edge.
- name: Install docker-prune oneshot service
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker-prune.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prune Docker build cache + unused images (disk hygiene)
      [Service]
      Type=oneshot
      ExecStart=/usr/bin/docker builder prune -af --filter until={{ docker_prune_age }}
      ExecStart=/usr/bin/docker image prune -af --filter until={{ docker_prune_age }}
  when: "'docker_hosts' in group_names"
  notify: Reload systemd

- name: Install docker-prune timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/docker-prune.timer
    mode: "0644"
    content: |
      [Unit]
      Description=Weekly Docker prune
      [Timer]
      OnCalendar={{ docker_prune_oncalendar }}
      Persistent=true
      [Install]
      WantedBy=timers.target
  when: "'docker_hosts' in group_names"
  notify: Reload systemd

- name: Enable + start docker-prune timer
  ansible.builtin.systemd:
    name: docker-prune.timer
    enabled: true
    state: started
    daemon_reload: true
  when: "'docker_hosts' in group_names"

# --- DNS hygiene (k3s nodes) --------------------------------------------------
# A divergent global `DNS=` in resolved.conf stacks ON TOP of the link/DHCP DNS,
# pushing the node past 3 upstreams → kubelet caps pod resolv.conf to 3 and spams
# DNSConfigForming warnings (lw-c3 hit this 2026-06-22). Enforce link-DNS-only —
# the uniform state lw-c1/lw-c2 already have. Idempotent: re-runs leave the
# already-commented line untouched.
- name: Disable divergent global DNS override (k3s nodes rely on link/DHCP DNS)
  ansible.builtin.replace:
    path: /etc/systemd/resolved.conf
    regexp: '^DNS=(.*)$'
    replace: '#DNS=\1'
  when: "'k3s_nodes' in group_names"
  notify: Restart systemd-resolved
