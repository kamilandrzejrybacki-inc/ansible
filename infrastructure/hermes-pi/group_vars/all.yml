---
hermes_install_dir: /opt/hermes
hermes_agent_version: "0.7.0"
hermes_webui_tag: "latest"
hermes_model: "gpt-5.3-codex"
hermes_provider: "openai-codex"
hermes_max_output_tokens: 32768
hermes_webui_port: 8788

telegram_allowed_user_id: "8207765643"

k8s_node_ip: "192.168.0.107"
mcp_bridges_domain: "mcp.kamilandrzejrybacki.dpdns.org"

hermes_mcp_servers:
  grafana:
    url: "http://grafana.{{ mcp_bridges_domain }}/mcp"
  obsidian:
    url: "http://obsidian.{{ mcp_bridges_domain }}/mcp"
  netbox:
    url: "http://netbox.{{ mcp_bridges_domain }}/mcp"
  vault:
    url: "http://vault.{{ mcp_bridges_domain }}/mcp"
  distillery:
    url: "http://distillery.{{ mcp_bridges_domain }}/mcp"
  paperless:
    url: "http://paperless.{{ mcp_bridges_domain }}/mcp"
  n8n:
    url: "http://192.168.0.108:5678/mcp-server/http"
    headers:
      Authorization: "Bearer {{ n8n_mcp_token }}"

# ── Memory enhancement ──────────────────────────────────────────────────────
hermes_registry: "192.168.0.107:30500"
hermes_webui_fork_tag: "latest"
hermes_dreaming_tag: "latest"
hermes_webui_fork_repo: "https://github.com/kamilandrzejrybacki-inc/hermes-webui-fork.git"
hermes_dreaming_repo: "https://github.com/kamilandrzejrybacki-inc/hermes-dreaming.git"

memory_source_supermemory_enabled: true
memory_source_dreaming_enabled: true
dreaming_cron: "0 3 * * *"
dreaming_lookback_days: 7
