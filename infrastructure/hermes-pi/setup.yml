---
# =============================================================================
# Hermes Pi Deployment
# =============================================================================
# Deploys Hermes (Truteń) as a Docker Compose stack on lw-pi.
# Single instance serving both Web UI and Telegram gateway.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup.yml \
#     -e telegram_bot_token=XXX \
#     -e openai_access_token=XXX \
#     -e openai_refresh_token=XXX \
#     -e groq_api_key=XXX \
#     -e n8n_mcp_token=XXX \
#     -e github_pat=XXX
# =============================================================================

- name: Deploy Hermes to Pi
  hosts: hermes
  become: true

  pre_tasks:
    - name: Ensure Docker is installed and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Ensure user is in docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Validate required secrets
      ansible.builtin.assert:
        that:
          - telegram_bot_token is defined
          - openai_access_token is defined
          - openai_refresh_token is defined
          - groq_api_key is defined
          - n8n_mcp_token is defined
        fail_msg: "Pass secrets via -e flags"

  tasks:
    # ── Create directory structure ────────────────────────────────
    - name: Create Hermes directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ hermes_install_dir }}"
        - "{{ hermes_install_dir }}/data"
        - "{{ hermes_install_dir }}/data/memories"
        - "{{ hermes_install_dir }}/data/.ssh"

    # ── SSH key for lw-main access ────────────────────────────────
    - name: Generate SSH key for Hermes (if not present)
      community.crypto.openssh_keypair:
        path: "{{ hermes_install_dir }}/data/.ssh/id_ed25519"
        type: ed25519
        comment: "hermes@lw-pi"
        owner: "{{ ansible_user }}"
        mode: "0600"
      register: hermes_ssh_key

    - name: Read Hermes public key
      ansible.builtin.slurp:
        src: "{{ hermes_install_dir }}/data/.ssh/id_ed25519.pub"
      register: hermes_pubkey

    - name: Authorize Hermes key on lw-main
      ansible.posix.authorized_key:
        user: kamil-rybacki
        key: "{{ hermes_pubkey.content | b64decode }}"
        state: present
      delegate_to: lw-main

    - name: Add lw-main to SSH known_hosts
      ansible.builtin.known_hosts:
        path: "{{ hermes_install_dir }}/data/.ssh/known_hosts"
        name: "192.168.0.105"
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 192.168.0.105 2>/dev/null') }}"
        state: present

    - name: Fix SSH dir ownership
      ansible.builtin.file:
        path: "{{ hermes_install_dir }}/data/.ssh"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    # ── Deploy templates ──────────────────────────────────────────
    - name: Deploy telegram bridge
      ansible.builtin.template:
        src: telegram_bridge.py.j2
        dest: "{{ hermes_install_dir }}/telegram_bridge.py"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ hermes_install_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy config.yaml
      ansible.builtin.template:
        src: config.yaml.j2
        dest: "{{ hermes_install_dir }}/data/config.yaml"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy nginx.conf
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: "{{ hermes_install_dir }}/nginx.conf"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy .env
      ansible.builtin.template:
        src: env.j2
        dest: "{{ hermes_install_dir }}/.env"
        owner: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Deploy auth.json (only if not present)
      ansible.builtin.copy:
        content: |
          {"version":1,"providers":{"openai-codex":{"tokens":{"access_token":"{{ openai_access_token }}","refresh_token":"{{ openai_refresh_token }}"},"auth_mode":"chatgpt"}},"active_provider":"openai-codex"}
        dest: "{{ hermes_install_dir }}/data/auth.json"
        owner: "{{ ansible_user }}"
        mode: "0600"
        force: false
      no_log: true

    - name: Seed USER.md baseline (only if not present)
      ansible.builtin.copy:
        content: |
          # User: Kamil Rybacki

          - Senior software engineer and homelab operator
          - Prefers concise, technical communication
          - Runs a multi-node k3s homelab cluster with full GitOps pipeline
          - Active projects span infrastructure automation, AI/ML, and web applications
          - GitHub: kamilrybacki (personal), kamilandrzejrybacki-inc (org)
          - Values immutability, small files, and test-driven development
        dest: "{{ hermes_install_dir }}/data/memories/USER.md"
        owner: "{{ ansible_user }}"
        mode: "0644"
        force: false

    # ── Start stack ───────────────────────────────────────────────
    - name: Start Hermes stack
      community.docker.docker_compose_v2:
        project_src: "{{ hermes_install_dir }}"
        state: present
        pull: always
      become: false
