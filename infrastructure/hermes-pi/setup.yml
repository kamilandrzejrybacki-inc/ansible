---
# =============================================================================
# Hermes Pi Deployment
# =============================================================================
# Deploys Hermes (Truteń) as a Docker Compose stack on lw-pi.
# Single instance serving both Web UI and Telegram gateway.
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup.yml \
#     -e telegram_bot_token=XXX \
#     -e openai_access_token=XXX \
#     -e openai_refresh_token=XXX \
#     -e groq_api_key=XXX \
#     -e n8n_mcp_token=XXX \
#     -e github_pat=XXX
# =============================================================================

# =============================================================================
# Play 1: Bootstrap docker-builders on lw-c1
# =============================================================================
- name: Bootstrap docker-builders ArgoCD application
  hosts: builders
  gather_facts: false

  tasks:
    - name: Deploy ArgoCD docker-builders Application manifest
      ansible.builtin.template:
        src: argocd-docker-builders-app.yaml.j2
        dest: /tmp/argocd-docker-builders-app.yaml
        mode: "0644"

    - name: Apply ArgoCD Application
      ansible.builtin.command:
        cmd: kubectl apply -f /tmp/argocd-docker-builders-app.yaml
      environment:
        KUBECONFIG: /home/kamil/.kube/config

    - name: Wait for registry Deployment to be available
      ansible.builtin.command:
        cmd: >
          kubectl wait deployment/registry
          -n docker-builders
          --for=condition=available
          --timeout=120s
      environment:
        KUBECONFIG: /home/kamil/.kube/config

# =============================================================================
# Play 2: Build arm64 images via Kaniko on lw-c1
# =============================================================================
- name: Build Hermes custom images
  hosts: builders
  gather_facts: true

  tasks:
    - name: Create Kaniko build Job manifests
      ansible.builtin.template:
        src: kaniko-job.yaml.j2
        dest: "/tmp/kaniko-job-{{ item.name }}.yaml"
        mode: "0644"
      loop:
        - name: hermes-webui-fork
          repo: "{{ hermes_webui_fork_repo }}"
          tag: "{{ hermes_webui_fork_tag }}"
        - name: hermes-dreaming
          repo: "{{ hermes_dreaming_repo }}"
          tag: "{{ hermes_dreaming_tag }}"
        - name: hermes-supermemory
          repo: "{{ hermes_supermemory_repo }}"
          tag: "{{ hermes_supermemory_tag }}"

    - name: Apply Kaniko Jobs
      ansible.builtin.command:
        cmd: "kubectl apply -f /tmp/kaniko-job-{{ item.name }}.yaml"
      loop:
        - name: hermes-webui-fork
        - name: hermes-dreaming
        - name: hermes-supermemory
      environment:
        KUBECONFIG: /home/kamil/.kube/config

    - name: Wait for all Kaniko Jobs to complete
      ansible.builtin.command:
        cmd: >
          kubectl wait jobs
          -l app.kubernetes.io/managed-by=kaniko-builder
          -n docker-builders
          --for=condition=complete
          --timeout=1200s
      environment:
        KUBECONFIG: /home/kamil/.kube/config
      register: kaniko_wait
      failed_when: kaniko_wait.rc != 0

- name: Deploy Hermes to Pi
  hosts: hermes
  become: true

  pre_tasks:
    - name: Ensure Docker is installed and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Ensure user is in docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Validate required secrets
      ansible.builtin.assert:
        that:
          - telegram_bot_token is defined
          - openai_access_token is defined
          - openai_refresh_token is defined
          - groq_api_key is defined
          - n8n_mcp_token is defined
          - supermemory_api_key is defined
        fail_msg: "Pass secrets via -e flags"

    - name: Configure Docker insecure registry
      ansible.builtin.template:
        src: daemon.json.j2
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
      notify: Restart Docker

    - name: Flush handlers (ensure Docker restarts before pulling)
      ansible.builtin.meta: flush_handlers

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

  tasks:
    # ── Create directory structure ────────────────────────────────
    - name: Create Hermes directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ hermes_install_dir }}"
        - "{{ hermes_install_dir }}/data"
        - "{{ hermes_install_dir }}/data/memories"
        - "{{ hermes_install_dir }}/data/.ssh"

    - name: Create Dreaming subdirectories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ hermes_install_dir }}/data/memories/dreaming/light"
        - "{{ hermes_install_dir }}/data/memories/dreaming/rem"
        - "{{ hermes_install_dir }}/data/memories/dreaming/deep"
        - "{{ hermes_install_dir }}/data/memories/.dreams"

    # ── SSH key for lw-main access ────────────────────────────────
    - name: Generate SSH key for Hermes (if not present)
      community.crypto.openssh_keypair:
        path: "{{ hermes_install_dir }}/data/.ssh/id_ed25519"
        type: ed25519
        comment: "hermes@lw-pi"
        owner: "{{ ansible_user }}"
        mode: "0600"
      register: hermes_ssh_key

    - name: Read Hermes public key
      ansible.builtin.slurp:
        src: "{{ hermes_install_dir }}/data/.ssh/id_ed25519.pub"
      register: hermes_pubkey

    - name: Authorize Hermes key on lw-main
      ansible.posix.authorized_key:
        user: kamil-rybacki
        key: "{{ hermes_pubkey.content | b64decode }}"
        state: present
      delegate_to: lw-main

    - name: Add lw-main to SSH known_hosts
      ansible.builtin.known_hosts:
        path: "{{ hermes_install_dir }}/data/.ssh/known_hosts"
        name: "192.168.0.105"
        key: "{{ lookup('pipe', 'ssh-keyscan -t ed25519 192.168.0.105 2>/dev/null') }}"
        state: present

    - name: Fix SSH dir ownership
      ansible.builtin.file:
        path: "{{ hermes_install_dir }}/data/.ssh"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: true

    # ── Deploy templates ──────────────────────────────────────────
    - name: Deploy telegram bridge
      ansible.builtin.template:
        src: telegram_bridge.py.j2
        dest: "{{ hermes_install_dir }}/telegram_bridge.py"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ hermes_install_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy config.yaml
      ansible.builtin.template:
        src: config.yaml.j2
        dest: "{{ hermes_install_dir }}/data/config.yaml"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy streaming patch script
      ansible.builtin.template:
        src: patch_streaming.py.j2
        dest: "{{ hermes_install_dir }}/data/patch_streaming.py"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy nginx.conf
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: "{{ hermes_install_dir }}/nginx.conf"
        owner: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy .env
      ansible.builtin.template:
        src: env.j2
        dest: "{{ hermes_install_dir }}/.env"
        owner: "{{ ansible_user }}"
        mode: "0600"
      no_log: true

    - name: Deploy auth.json (only if not present)
      ansible.builtin.copy:
        content: |
          {"version":1,"providers":{"openai-codex":{"tokens":{"access_token":"{{ openai_access_token }}","refresh_token":"{{ openai_refresh_token }}"},"auth_mode":"chatgpt"}},"active_provider":"openai-codex"}
        dest: "{{ hermes_install_dir }}/data/auth.json"
        owner: "{{ ansible_user }}"
        mode: "0600"
        force: false
      no_log: true

    - name: Seed USER.md baseline (only if not present)
      ansible.builtin.copy:
        content: |
          # User: Kamil Rybacki

          - Senior software engineer and homelab operator
          - Prefers concise, technical communication
          - Runs a multi-node k3s homelab cluster with full GitOps pipeline
          - Active projects span infrastructure automation, AI/ML, and web applications
          - GitHub: kamilrybacki (personal), kamilandrzejrybacki-inc (org)
          - Values immutability, small files, and test-driven development
        dest: "{{ hermes_install_dir }}/data/memories/USER.md"
        owner: "{{ ansible_user }}"
        mode: "0644"
        force: false

    # ── Start stack ───────────────────────────────────────────────
    - name: Start Hermes stack
      community.docker.docker_compose_v2:
        project_src: "{{ hermes_install_dir }}"
        state: present
        pull: always
      become: false
