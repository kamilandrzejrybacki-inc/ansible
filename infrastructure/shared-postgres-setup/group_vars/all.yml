# infrastructure/shared-postgres-setup/group_vars/all.yml
---
shared_postgres_image: "postgres:16-alpine"
shared_postgres_port: 5432
shared_postgres_data_dir: /opt/shared-postgres
shared_postgres_container_name: shared-postgres
shared_postgres_bind_address: "192.168.0.115"
shared_postgres_restart_policy: unless-stopped
shared_postgres_health_check_retries: 20
shared_postgres_health_check_delay: 5

# Server tuning, applied via -c flags on the container command so the values are
# declarative rather than hidden in postgresql.auto.conf.
#
# SCOPE: this role manages a SEPARATE shared Postgres for app tenants
# (outline/netbox/paperless, container `shared-postgres`). It is NOT the k3s
# datastore. The live k3s datastore is a hand-run `docker run` container named
# `k3s-postgres` on 192.168.0.115 (bind /mnt/pool/k3s-state/data, db k3s_state,
# user k3s) that is NOT managed by any ansible role — TODO: bring it under IaC.
# Its max_connections was raised 200→300 manually on 2026-05-31 (it kept hitting
# the 200 ceiling under bursty load, stalling the API↔datastore link and causing
# lockstep kube-vip/nfs leader-election restarts) by recreating that container
# with the same spec + -c max_connections=300.
shared_postgres_max_connections: 300
shared_postgres_shared_buffers: 512MB
shared_postgres_effective_cache_size: 1536MB
shared_postgres_work_mem: 4MB

# Tenant definitions — each service gets its own database and user
shared_postgres_tenants:
  - name: outline
    conn_limit: 20
  - name: netbox
    conn_limit: 30
  - name: paperless
    conn_limit: 20
