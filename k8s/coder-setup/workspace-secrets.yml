---
# Workspace Secrets Bootstrap Playbook
# Creates k8s secrets used by Coder agent workspaces:
#   - coder-claude-credentials  (Claude Code OAuth tokens)
#   - coder-github-token        (GitHub PAT for repo cloning)
#
# Prerequisites:
#   - ~/.claude/.credentials.json present on control machine
#   - ~/.vault-ansible.yml with valid token (ansible-automation policy)
#   - ~/.kube/lw-c1.yaml kubeconfig
#
# Usage:
#   ansible-playbook k8s/coder-setup/workspace-secrets.yml

- name: Bootstrap workspace secrets in agent-workspaces namespace
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kubeconfig_local_path: "{{ lookup('env', 'HOME') }}/.kube/lw-c1.yaml"
    credentials_file: "{{ lookup('env', 'HOME') }}/.claude/.credentials.json"

  tasks:
    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load GitHub secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "github"

    - name: Assert GitHub PAT loaded from Vault
      ansible.builtin.assert:
        that:
          - _vault_secrets.runner_pat is defined
          - _vault_secrets.runner_pat | length > 0
        fail_msg: "homelab/github.runner_pat not found in Vault"

    - name: Save GitHub PAT before loading next service
      ansible.builtin.set_fact:
        _github_runner_pat: "{{ _vault_secrets.runner_pat }}"
      no_log: true

    - name: Check Codex auth file exists
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.codex/auth.json"
      register: _codex_auth_stat

    - name: Assert Codex auth file exists
      ansible.builtin.assert:
        that: _codex_auth_stat.stat.exists
        fail_msg: "~/.codex/auth.json not found — run 'codex' and authenticate first"

    - name: Read Codex auth
      ansible.builtin.set_fact:
        _codex_auth: "{{ lookup('file', lookup('env', 'HOME') + '/.codex/auth.json') }}"
      no_log: true

    - name: Check credentials file exists
      ansible.builtin.stat:
        path: "{{ credentials_file }}"
      register: _creds_stat

    - name: Assert credentials file exists
      ansible.builtin.assert:
        that: _creds_stat.stat.exists
        fail_msg: "{{ credentials_file }} not found — run Claude Code and authenticate first"

    - name: Read Claude credentials
      ansible.builtin.set_fact:
        _claude_credentials: "{{ lookup('file', credentials_file) }}"
      no_log: true

    - name: Create coder-claude-credentials secret
      ansible.builtin.shell: |
        kubectl create secret generic coder-claude-credentials \
          --namespace agent-workspaces \
          --from-literal=credentials.json='{{ _claude_credentials | replace("'", "'\"'\"'") }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _creds_secret
      changed_when: "'created' in _creds_secret.stdout or 'configured' in _creds_secret.stdout"
      no_log: true

    - name: Create coder-github-token secret
      ansible.builtin.shell: |
        kubectl create secret generic coder-github-token \
          --namespace agent-workspaces \
          --from-literal=token='{{ _github_runner_pat }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _gh_secret
      changed_when: "'created' in _gh_secret.stdout or 'configured' in _gh_secret.stdout"
      no_log: true

    - name: Create coder-codex-credentials secret
      ansible.builtin.shell: |
        kubectl create secret generic coder-codex-credentials \
          --namespace agent-workspaces \
          --from-literal=auth.json='{{ _codex_auth | replace("'", "'\"'\"'") }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _codex_secret
      changed_when: "'created' in _codex_secret.stdout or 'configured' in _codex_secret.stdout"
      no_log: true

    - name: Load Telegram secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "telegram"

    - name: Assert Telegram credentials loaded from Vault
      ansible.builtin.assert:
        that:
          - _vault_secrets.bot_token is defined
          - _vault_secrets.chat_id is defined
        fail_msg: "homelab/telegram.bot_token or .chat_id not found in Vault"

    - name: Create coder-telegram-auth secret
      ansible.builtin.shell: |
        kubectl create secret generic coder-telegram-auth \
          --namespace agent-workspaces \
          --from-literal=bot_token='{{ _vault_secrets.bot_token }}' \
          --from-literal=chat_id='{{ _vault_secrets.chat_id }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _telegram_secret
      changed_when: "'created' in _telegram_secret.stdout or 'configured' in _telegram_secret.stdout"
      no_log: true

    - name: Create ghcr-pull-secret for private image
      ansible.builtin.shell: |
        kubectl create secret docker-registry ghcr-pull-secret \
          --namespace agent-workspaces \
          --docker-server=ghcr.io \
          --docker-username=kamilandrzejrybacki-inc \
          --docker-password='{{ _github_runner_pat }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _pull_secret
      changed_when: "'created' in _pull_secret.stdout or 'configured' in _pull_secret.stdout"
      no_log: true

    - name: Workspace secrets ready
      ansible.builtin.debug:
        msg: |
          Workspace secrets bootstrapped in agent-workspaces namespace:
            - coder-claude-credentials  (Claude Code OAuth)
            - coder-codex-credentials   (Codex CLI OAuth)
            - coder-github-token        (GitHub PAT for repo cloning)
            - coder-telegram-auth       (Telegram bot for Claude auth flow)
            - ghcr-pull-secret          (GHCR image pull auth)

          Next: push updated coder template:
            coder templates push interactive-workspace
