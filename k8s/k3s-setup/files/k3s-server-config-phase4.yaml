# /etc/rancher/k3s/config.yaml for Phase 4 HA control plane.
#
# DO NOT APPLY UNTIL:
# - MetalLB live + Traefik on VIP 192.168.0.50 (Phase 1, Task 4)
# - kube-vip chart applied (charts/kube-vip/)
# - Etcd migration done: `k3s server --cluster-init` on lw-c1 first
# - Pi-hole has record: 192.168.0.60 k3s.kamilandrzejrybacki.dpdns.org
# - Maintenance window
#
# After applying on lw-c1, restart k3s; verify; THEN join lw-c2, lw-c3 as servers
# with `--server https://192.168.0.107:6443 --token <node-token>`.

# Disable bundled k3s ServiceLB (klipper-lb). MetalLB owns LB IPs.
disable:
  - servicelb

# Cluster TLS SANs — all node IPs + API VIP + k3s.* hostname
tls-san:
  - 192.168.0.60
  - 192.168.0.107
  - 192.168.0.108
  - 192.168.0.240
  - k3s.kamilandrzejrybacki.dpdns.org

# Etcd snapshots → MinIO S3 (post-migration only)
etcd-snapshot-schedule-cron: "0 3 * * *"   # daily 03:00 UTC
etcd-snapshot-retention: 14
etcd-s3: true
etcd-s3-endpoint: "192.168.0.107:30910"     # MinIO NodePort
etcd-s3-bucket: "k3s-snapshots"
etcd-s3-region: "homelab"
etcd-s3-insecure: true
# Access keys provided via /etc/k3s-backup.env or directly here.
# Prefer env file referenced by k3s.service override — credentials NOT in config.yaml.
