---
# Kubelet + alloy log tailers each hold an inotify instance per watched pod;
# the kernel default (128 per UID) exhausts on busy nodes. Root hitting the cap
# breaks alloy's loki.source.kubernetes tailing ("failed to create fsnotify
# watcher: too many open files" flooding pod streams) → silent log-shipping
# gaps exactly when incidents need diagnosing (cms-auth, 2026-06-05).
- name: Raise inotify limits for kubelet/log-tailing
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/90-k3s-inotify.conf
    state: present
    reload: true
  loop:
    - { name: fs.inotify.max_user_instances, value: "512" }
    - { name: fs.inotify.max_user_watches, value: "524288" }

- name: Install curl (required by K3s installer)
  ansible.builtin.apt:
    name: curl
    state: present

- name: Install K3s
  ansible.builtin.shell: |
    curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION={{ k3s_version }} sh -s - \
      --write-kubeconfig-mode 644
  args:
    creates: /usr/local/bin/k3s
  environment:
    HOME: /root

- name: Enable and start K3s service
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for K3s node to be ready
  ansible.builtin.command: >
    kubectl get nodes --no-headers
  register: _k3s_nodes
  until: "'Ready' in _k3s_nodes.stdout"
  retries: "{{ k3s_node_ready_retries }}"
  delay: "{{ k3s_node_ready_delay }}"
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
