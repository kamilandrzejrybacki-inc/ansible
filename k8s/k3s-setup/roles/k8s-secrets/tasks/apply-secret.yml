---
- name: "Load Vault secrets for {{ item.vault_path }}"
  ansible.builtin.uri:
    url: "{{ _vault_addr }}/v1/{{ _vault_kv_mount }}/data/homelab/{{ item.vault_path }}"
    headers:
      X-Vault-Token: "{{ _vault_token }}"
    return_content: true
  register: _vault_resp
  no_log: true

- name: "Parse secrets for {{ item.vault_path }}"
  ansible.builtin.set_fact:
    _loaded_secrets: "{{ (_vault_resp.content | from_json).data.data }}"
  no_log: true

- name: "Create namespace {{ item.namespace }}"
  ansible.builtin.command: kubectl create namespace {{ item.namespace }}
  environment:
    KUBECONFIG: "{{ kubeconfig_local_path }}"
  register: _ns
  changed_when: _ns.rc == 0
  failed_when: _ns.rc != 0 and 'already exists' not in _ns.stderr

- name: "Render secret {{ item.namespace }}/{{ item.name }}"
  ansible.builtin.template:
    src: secret.yml.j2
    dest: "/tmp/k8s-secret-{{ item.name }}.yml"
    mode: "0600"
  no_log: true

- name: "Apply secret {{ item.namespace }}/{{ item.name }}"
  ansible.builtin.command: kubectl apply -f /tmp/k8s-secret-{{ item.name }}.yml
  environment:
    KUBECONFIG: "{{ kubeconfig_local_path }}"
  no_log: true

- name: "Remove temp file for {{ item.name }}"
  ansible.builtin.file:
    path: "/tmp/k8s-secret-{{ item.name }}.yml"
    state: absent
