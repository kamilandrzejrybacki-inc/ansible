---
- name: Process each secret definition
  ansible.builtin.include_tasks: apply-secret.yml
  loop: "{{ k8s_secrets }}"
  loop_control:
    label: "{{ item.namespace }}/{{ item.name }}"

- name: Create MCP server secrets
  ansible.builtin.include_tasks: mcp-servers.yml

- name: Create Open Design codex-auth secret
  ansible.builtin.include_tasks: open-design.yml
