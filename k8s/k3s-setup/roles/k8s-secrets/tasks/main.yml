---
- name: Process each secret definition
  ansible.builtin.include_tasks: apply-secret.yml
  loop: "{{ k8s_secrets }}"
  loop_control:
    label: "{{ item.namespace }}/{{ item.name }}"

- name: Create MCP server secrets
  ansible.builtin.include_tasks: mcp-servers.yml

- name: Create Open Design codex-auth secret
  ansible.builtin.include_tasks: open-design.yml

- name: Create Hermes codex-auth + discord secrets
  ansible.builtin.include_tasks: hermes.yml
  tags: [hermes, secrets]

- name: Create gnhf-bot secrets (discord/gh from Vault + Claude creds from control machine)
  ansible.builtin.include_tasks: gnhf-bot.yml
  tags: [gnhf-bot, secrets]

- name: Seed Discord webhook URL secrets (grafana alerts + feedcord releases)
  ansible.builtin.include_tasks: discord-webhooks.yml
  tags: [discord-webhooks, secrets]
