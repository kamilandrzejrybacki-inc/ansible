---
# Secrets for charts/open-design in namespace open-design:
#   - open-design-codex-auth  (key auth.json)      — ChatGPT-OAuth Codex creds
#   - ghcr-pull               (dockerconfigjson)   — private image pull
#
# Codex auth resolution (fully headless after the first run):
#   1. If ~/.codex/auth.json exists on the control machine (one-time
#      `codex login`), use it AND cache it to Vault
#      secret/homelab/open-design key codex_auth_json.
#   2. Otherwise fall back to that Vault key — so any runner/machine can
#      provision without the local file present.
#   3. If neither, fail with instructions.
# The OAuth browser consent is the only irreducibly-manual step, and it is
# shared with k8s/coder-setup (coder-codex-credentials uses the same file).
#
# ghcr pull: reuse the working homelab pull secret (classic ghp_ PAT for user
# kamilrybacki) by copying it from an existing namespace. The Vault
# github.runner_pat is a gho_ token WITHOUT package read (403 on ghcr), so it
# must NOT be used here. The chart seeds open-design-codex-auth into a PVC only
# if absent, so in-cluster OAuth token refresh persists.
- name: Check Codex auth file on control machine
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.codex/auth.json"
  register: _od_codex_stat

# --- Path 1: local file present -> use it + cache to Vault ---
- name: Read Codex auth from control machine
  ansible.builtin.set_fact:
    _od_codex_auth: "{{ lookup('file', lookup('env', 'HOME') + '/.codex/auth.json') }}"
  when: _od_codex_stat.stat.exists
  no_log: true

- name: Cache Codex auth to Vault for headless re-provisioning
  ansible.builtin.uri:
    url: "{{ _vault_addr }}/v1/{{ _vault_kv_mount }}/data/homelab/open-design"
    method: POST
    headers:
      X-Vault-Token: "{{ _vault_token }}"
    body_format: json
    body:
      data:
        codex_auth_json: "{{ _od_codex_auth }}"
    status_code: [200, 204]
  when: _od_codex_stat.stat.exists
  no_log: true

# --- Path 2: no local file -> pull from Vault ---
- name: Fall back to Codex auth from Vault
  when: not _od_codex_stat.stat.exists
  block:
    - name: Load Codex auth from Vault
      ansible.builtin.uri:
        url: "{{ _vault_addr }}/v1/{{ _vault_kv_mount }}/data/homelab/open-design"
        headers:
          X-Vault-Token: "{{ _vault_token }}"
        return_content: true
      register: _od_codex_vault
      no_log: true

    - name: Capture Codex auth from Vault
      ansible.builtin.set_fact:
        _od_codex_auth: "{{ (_od_codex_vault.content | from_json).data.data.codex_auth_json }}"
      no_log: true

- name: Assert Codex auth resolved
  ansible.builtin.assert:
    that:
      - _od_codex_auth is defined
      - _od_codex_auth | length > 0
    fail_msg: >-
      No Codex auth available. Run 'codex login' on the control machine once
      (writes ~/.codex/auth.json), or seed Vault secret/homelab/open-design
      key codex_auth_json.

- name: Ensure open-design namespace
  ansible.builtin.command: kubectl create namespace open-design
  environment:
    KUBECONFIG: "{{ kubeconfig_local_path }}"
  register: _od_ns
  changed_when: _od_ns.rc == 0
  failed_when: _od_ns.rc != 0 and 'already exists' not in _od_ns.stderr

- name: Create open-design-codex-auth secret
  ansible.builtin.shell: |
    kubectl create secret generic open-design-codex-auth \
      --namespace open-design \
      --from-literal=auth.json='{{ _od_codex_auth | replace("'", "'\"'\"'") }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: "{{ kubeconfig_local_path }}"
  register: _od_codex_secret
  changed_when: "'created' in _od_codex_secret.stdout or 'configured' in _od_codex_secret.stdout"
  no_log: true

- name: Copy the working ghcr-pull secret into open-design
  ansible.builtin.shell: |
    kubectl get secret ghcr-pull -n dbt -o json \
      | python3 -c 'import sys,json;d=json.load(sys.stdin);d["metadata"]={"name":"ghcr-pull","namespace":"open-design"};print(json.dumps(d))' \
      | kubectl apply -f -
  environment:
    KUBECONFIG: "{{ kubeconfig_local_path }}"
  register: _od_pull_secret
  changed_when: "'created' in _od_pull_secret.stdout or 'configured' in _od_pull_secret.stdout"
  no_log: true
