---
- name: Install NFS client packages
  ansible.builtin.apt:
    name:
      - nfs-common
    state: present
    update_cache: true
  become: true

- name: Deploy netplan static route to NAS subnet
  ansible.builtin.template:
    src: 10-nfs-route.yaml.j2
    dest: /etc/netplan/10-nfs-route.yaml
    owner: root
    group: root
    mode: "0600"
  become: true
  notify: apply netplan

- name: Flush handlers (apply netplan immediately)
  ansible.builtin.meta: flush_handlers
