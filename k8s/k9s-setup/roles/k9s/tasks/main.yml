---
- name: Check if k9s is already installed
  ansible.builtin.command: k9s version --short
  register: k9s_check
  changed_when: false
  failed_when: false

- name: Determine system architecture
  ansible.builtin.set_fact:
    k9s_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
  when: k9s_check.rc != 0

- name: Download k9s binary
  ansible.builtin.get_url:
    url: "https://github.com/derailed/k9s/releases/download/{{ k9s_version }}/k9s_Linux_{{ k9s_arch }}.tar.gz"
    dest: /tmp/k9s.tar.gz
    mode: "0644"
  when: k9s_check.rc != 0

- name: Extract k9s binary
  ansible.builtin.unarchive:
    src: /tmp/k9s.tar.gz
    dest: /tmp
    remote_src: true
  when: k9s_check.rc != 0

- name: Install k9s binary
  ansible.builtin.copy:
    src: /tmp/k9s
    dest: /usr/local/bin/k9s
    mode: "0755"
    remote_src: true
  when: k9s_check.rc != 0

- name: Clean up downloaded files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/k9s.tar.gz
    - /tmp/k9s
  when: k9s_check.rc != 0

- name: Verify k9s installation
  ansible.builtin.command: k9s version --short
  register: k9s_version_output
  changed_when: false

- name: Display k9s version
  ansible.builtin.debug:
    msg: "k9s installed: {{ k9s_version_output.stdout }}"
