---
# Portkey Gateway Bootstrap Playbook
# One-time: writes keys to Vault, tears down ad-hoc deployment,
# creates K8s Secret, registers ArgoCD Application, updates n8n auth.
#
# After this playbook runs, ArgoCD manages Portkey entirely.
# Config changes go through git commits to kamilandrzejrybacki-inc/helm.
#
# Prerequisites:
#   - KEDA installed (run k8s/keda-setup/setup.yml first)
#   - ~/.vault-ansible.yml with vault_addr and vault_token
#
# Usage:
#   ansible-playbook k8s/portkey-setup/setup.yml

# -- Play 1: Write API keys to Vault -----------------------------------------
- name: Write Portkey API keys to Vault
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: groq_api_key
      prompt: "Groq API key (console.groq.com)"
      private: true

    - name: nvidia_api_key
      prompt: "NVIDIA NIM API key (build.nvidia.com)"
      private: true

    - name: deepseek_api_key
      prompt: "DeepSeek API key (platform.deepseek.com)"
      private: true

    - name: portkey_api_key
      prompt: "Portkey gateway auth key (generate with: openssl rand -hex 32)"
      private: true

  tasks:
    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Validate at least one provider key is provided
      ansible.builtin.assert:
        that:
          - >-
            (groq_api_key | default('') | length > 0) or
            (nvidia_api_key | default('') | length > 0) or
            (deepseek_api_key | default('') | length > 0)
        fail_msg: "At least one provider API key must be provided."

    - name: Validate gateway auth key is provided
      ansible.builtin.assert:
        that:
          - portkey_api_key | default('') | length > 0
        fail_msg: "Portkey gateway auth key is required."

    - name: Store API keys to Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/store.yml"
      vars:
        vault_service_name: "portkey"
        vault_secrets_data:
          groq_api_key: "{{ groq_api_key | default('') }}"
          nvidia_api_key: "{{ nvidia_api_key | default('') }}"
          deepseek_api_key: "{{ deepseek_api_key | default('') }}"
          portkey_api_key: "{{ portkey_api_key }}"
      when: _vault_available | bool

# -- Play 2: Teardown existing ad-hoc Portkey deployment ----------------------
- name: Teardown ad-hoc Portkey deployment
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Delete existing Portkey Deployment (if present)
      ansible.builtin.command: >
        kubectl delete deployment portkey-gateway -n portkey --ignore-not-found
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _del_deploy
      changed_when: "'deleted' in _del_deploy.stdout"

    - name: Delete existing Portkey Services (if present)
      ansible.builtin.command: >
        kubectl delete service {{ item }} -n portkey --ignore-not-found
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      loop:
        - portkey-gateway
        - portkey-gateway-ext
      register: _del_svc
      changed_when: "'deleted' in _del_svc.stdout"

    - name: Report teardown
      ansible.builtin.debug:
        msg: "Ad-hoc Portkey deployment cleaned up. ArgoCD will deploy the new chart."

# -- Play 3: Create K8s Secret and bootstrap ArgoCD Application ---------------
- name: Bootstrap Portkey via ArgoCD
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check Vault availability
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/check.yml"

    - name: Load Portkey secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "portkey"

    - name: Create portkey namespace
      ansible.builtin.command: >
        kubectl create namespace portkey --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _ns
      changed_when: "'created' in _ns.stdout"

    - name: Create portkey-secrets K8s Secret
      ansible.builtin.command: >
        kubectl create secret generic portkey-secrets
        --namespace portkey
        --from-literal=GROQ_API_KEY={{ (_vault_secrets.groq_api_key | default('')) | quote }}
        --from-literal=OPENAI_API_KEY={{ (_vault_secrets.nvidia_api_key | default('')) | quote }}
        --from-literal=DEEPSEEK_API_KEY={{ (_vault_secrets.deepseek_api_key | default('')) | quote }}
        --from-literal=PORTKEY_API_KEY={{ _vault_secrets.portkey_api_key | quote }}
        --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_local_path }}"
      register: _secret
      changed_when: "'configured' in _secret.stdout or 'created' in _secret.stdout"
      no_log: true

# -- Play 4: Update n8n to pass gateway auth header ---------------------------
- name: Update n8n with Portkey auth header
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load Portkey secrets from Vault
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../../common/vault-integration/load.yml"
      vars:
        vault_service_name: "portkey"
      when: _vault_secrets is not defined

    - name: Add PORTKEY_API_KEY to n8n environment on lw-s1
      ansible.builtin.command: >
        ssh {{ n8n_host }}
        "grep -q PORTKEY_API_KEY {{ n8n_compose_dir }}/.env 2>/dev/null ||
         echo 'PORTKEY_API_KEY={{ _vault_secrets.portkey_api_key }}' >> {{ n8n_compose_dir }}/.env"
      register: _n8n_env
      changed_when: _n8n_env.rc == 0
      no_log: true

    - name: Restart n8n to pick up new env
      ansible.builtin.command: >
        ssh {{ n8n_host }} "cd {{ n8n_compose_dir }} && docker compose up -d"
      register: _n8n_restart
      changed_when: "'Started' in _n8n_restart.stderr or 'Recreat' in _n8n_restart.stderr"

    - name: Display completion summary
      ansible.builtin.debug:
        msg: |
          Portkey bootstrap complete!

          - Vault: secrets stored at secret/homelab/portkey
          - K8s: portkey-secrets created in portkey namespace
          - n8n: PORTKEY_API_KEY added to {{ n8n_compose_dir }}/.env
          - ArgoCD: will sync portkey chart from kamilandrzejrybacki-inc/helm

          Next: run k8s/k3s-setup/setup.yml (Plays 6-7 only) to register the ArgoCD Application,
          or add portkey to argocd_applications in k8s/k3s-setup/group_vars/all.yml and re-run.
