---
# =============================================================================
# Proxmox Kubernetes Full Stack Setup
# =============================================================================
# Provisions Proxmox VMs, bootstraps kubeadm clusters, and deploys the
# complete management stack: Helm, k9s, Headlamp, and ArgoCD.
#
# This is the equivalent of k8s-full-setup but for real Proxmox-based clusters
# instead of KIND.
#
# Usage:
#   ansible-playbook k8s/proxmox-k8s-setup/full-setup.yml \
#     -i k8s/proxmox-k8s-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

# -- Play 1: Setup wizard — gather all settings -------------------------------
- name: Proxmox Kubernetes Full Stack - Setup Wizard
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: proxmox_api_user
      prompt: |

        ══════════════════════════════════════════════
          Proxmox Kubernetes Full Stack Setup
        ══════════════════════════════════════════════

        This will provision Kubernetes clusters on Proxmox and install:
          • Helm 3 CLI
          • k9s terminal UI
          • Headlamp web dashboard
          • ArgoCD GitOps controller

        Clusters to create:
        {% for c in k8s_clusters %}
          • {{ c.name }} (1 CP + {{ c.workers.count }} workers)
        {% endfor %}

        [1/3] Proxmox API user
      default: "root@pam"
      private: false

    - name: proxmox_api_password
      prompt: "[2/3] Proxmox API password"
      private: true

    - name: cloudinit_ssh_public_key
      prompt: "[3/3] SSH public key for VM access (paste the key)"
      private: false

  tasks:
    - name: Store credentials as facts
      ansible.builtin.set_fact:
        proxmox_api_user: "{{ proxmox_api_user }}"
        proxmox_api_password: "{{ proxmox_api_password }}"
        cloudinit_ssh_public_key: "{{ cloudinit_ssh_public_key }}"
      no_log: true

# -- Play 2: Create cloud-init template --------------------------------------
- name: Create cloud-init VM template
  hosts: proxmox
  become: true
  roles:
    - proxmox-template

# -- Play 3: Clone and start VMs ---------------------------------------------
- name: Provision cluster VMs
  hosts: proxmox
  become: true
  roles:
    - proxmox-vms

# -- Play 4: Install K8s prerequisites on all nodes --------------------------
- name: Install Kubernetes prerequisites
  hosts: k8s_nodes
  become: true
  roles:
    - k8s-prereqs

# -- Play 5: Initialize control planes ---------------------------------------
- name: Initialize Kubernetes control planes
  hosts: k8s_controlplane
  become: true
  serial: 1
  roles:
    - k8s-controlplane

# -- Play 6: Join worker nodes -----------------------------------------------
- name: Join worker nodes to clusters
  hosts: k8s_workers
  become: true
  roles:
    - k8s-workers

# -- Play 7: Install CLI tools on control-plane nodes ------------------------
- name: Install Kubernetes CLI tools
  hosts: k8s_controlplane
  become: true
  roles:
    - helm
    - k9s

# -- Play 8: Deploy Headlamp on each cluster ---------------------------------
- name: Deploy Headlamp dashboard
  hosts: k8s_controlplane
  environment:
    KUBECONFIG: "/home/{{ vm_ssh_user }}/.kube/config"
  roles:
    - headlamp

# -- Play 9: Deploy ArgoCD on each cluster -----------------------------------
- name: Deploy ArgoCD GitOps controller
  hosts: k8s_controlplane
  environment:
    KUBECONFIG: "/home/{{ vm_ssh_user }}/.kube/config"
  roles:
    - argocd

# -- Play 10: Final summary --------------------------------------------------
- name: Full stack deployment summary
  hosts: k8s_controlplane
  gather_facts: false
  tasks:
    - name: Get cluster node status
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: "/home/{{ vm_ssh_user }}/.kube/config"
      changed_when: false
      register: _nodes

    - name: Get all namespaces
      ansible.builtin.command: kubectl get namespaces
      environment:
        KUBECONFIG: "/home/{{ vm_ssh_user }}/.kube/config"
      changed_when: false
      register: _namespaces

    - name: Display full stack summary
      ansible.builtin.debug:
        msg: |

          ══════════════════════════════════════════════
            Cluster: {{ cluster_name }} — Full Stack Ready
          ══════════════════════════════════════════════

          Nodes:
          {{ _nodes.stdout }}

          Namespaces:
          {{ _namespaces.stdout }}

          Access:
            Kubeconfig:  {{ playbook_dir }}/kubeconfigs/{{ cluster_name }}.conf
            Headlamp:    kubectl port-forward -n {{ headlamp_namespace }} svc/headlamp {{ headlamp_port }}:{{ headlamp_port }}
            ArgoCD:      kubectl port-forward -n {{ argocd_namespace }} svc/argocd-server {{ argocd_port }}:443

          CLI tools installed on control-plane ({{ ansible_host }}):
            • helm {{ helm_version }}
            • k9s {{ k9s_version }}
