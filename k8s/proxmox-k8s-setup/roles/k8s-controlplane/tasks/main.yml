---
# ============================================
# Kubernetes Control Plane Initialization
# ============================================
# Runs kubeadm init, installs the CNI plugin, and generates
# the join command for worker nodes.

- name: Check if cluster is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: _kubeadm_conf

- name: Initialize control plane
  when: not _kubeadm_conf.stat.exists
  block:
    - name: Deploy kubeadm configuration
      ansible.builtin.template:
        src: kubeadm-config.yml.j2
        dest: /tmp/kubeadm-config.yml
        mode: "0600"

    - name: Run kubeadm init
      ansible.builtin.command: >-
        kubeadm init --config /tmp/kubeadm-config.yml
      register: _kubeadm_init

    - name: Remove kubeadm config file
      ansible.builtin.file:
        path: /tmp/kubeadm-config.yml
        state: absent

- name: Create .kube directory for user
  ansible.builtin.file:
    path: "/home/{{ vm_ssh_user }}/.kube"
    state: directory
    owner: "{{ vm_ssh_user }}"
    group: "{{ vm_ssh_user }}"
    mode: "0700"

- name: Copy admin kubeconfig to user home
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: "{{ kubeconfig_remote_path }}"
    owner: "{{ vm_ssh_user }}"
    group: "{{ vm_ssh_user }}"
    mode: "0600"
    remote_src: true

# --- CNI plugin ---

- name: Install Calico CNI
  when: cni_plugin == "calico"
  block:
    - name: Apply Calico operator manifest
      ansible.builtin.command: >-
        kubectl apply -f
        https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_remote_path }}"
      register: _calico_operator
      changed_when: "'created' in _calico_operator.stdout"

    - name: Apply Calico custom resources
      ansible.builtin.command: >-
        kubectl apply -f
        https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_remote_path }}"
      register: _calico_cr
      changed_when: "'created' in _calico_cr.stdout"

- name: Install Flannel CNI
  when: cni_plugin == "flannel"
  block:
    - name: Apply Flannel manifest
      ansible.builtin.command: >-
        kubectl apply -f
        https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: "{{ kubeconfig_remote_path }}"
      register: _flannel
      changed_when: "'created' in _flannel.stdout"

# --- Wait for control plane readiness ---

- name: Wait for all control-plane pods to be ready
  ansible.builtin.command: >-
    kubectl wait --for=condition=Ready pods --all -n kube-system
    --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig_remote_path }}"
  changed_when: false
  retries: 3
  delay: 10
  register: _cp_ready
  until: _cp_ready.rc == 0

- name: Verify node is Ready
  ansible.builtin.command: >-
    kubectl get nodes -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: "{{ kubeconfig_remote_path }}"
  register: _node_ready
  changed_when: false
  retries: 10
  delay: 15
  until: _node_ready.stdout == "True"

# --- Generate join command for workers ---

- name: Generate join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: _join_command
  changed_when: false

- name: Store join command as fact
  ansible.builtin.set_fact:
    kubeadm_join_command: "{{ _join_command.stdout }}"
    cacheable: true

# --- Fetch kubeconfig to controller ---

- name: Ensure local kubeconfigs directory exists
  ansible.builtin.file:
    path: "{{ kubeconfig_local_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Fetch kubeconfig to controller
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ kubeconfig_local_dir }}/{{ cluster_name }}.conf"
    flat: true

- name: Display cluster information
  ansible.builtin.debug:
    msg: |
      Control plane initialized for cluster '{{ cluster_name }}'.

      Kubeconfig saved to: {{ kubeconfig_local_dir }}/{{ cluster_name }}.conf

      To use this cluster:
        export KUBECONFIG={{ kubeconfig_local_dir }}/{{ cluster_name }}.conf
        kubectl get nodes
