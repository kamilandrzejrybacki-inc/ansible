---
# ============================================
# Join Worker Nodes to Kubernetes Cluster
# ============================================
# Uses the join command generated by the control-plane role.

- name: Check if node is already part of a cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: _kubelet_conf

- name: Retrieve join command from control-plane
  ansible.builtin.set_fact:
    _join_cmd: >-
      {{ hostvars[_cp_host]['kubeadm_join_command'] }}
  vars:
    _cp_host: "{{ cluster_name }}-cp"
  when: not _kubelet_conf.stat.exists

- name: Validate join command is available
  ansible.builtin.assert:
    that:
      - _join_cmd is defined
      - _join_cmd | length > 0
    fail_msg: "Join command not available. Ensure the control-plane was initialized first."
  when: not _kubelet_conf.stat.exists

- name: Join the cluster
  ansible.builtin.command: "{{ _join_cmd }}"
  when: not _kubelet_conf.stat.exists

# --- Verify the join from the control-plane ---

- name: Verify node appears in cluster
  ansible.builtin.command: >-
    kubectl get node {{ inventory_hostname }}
    -o jsonpath='{.metadata.name}'
  environment:
    KUBECONFIG: "/home/{{ vm_ssh_user }}/.kube/config"
  delegate_to: "{{ cluster_name }}-cp"
  changed_when: false
  retries: 10
  delay: 15
  register: _node_check
  until: _node_check.rc == 0

- name: Wait for node to become Ready
  ansible.builtin.command: >-
    kubectl wait --for=condition=Ready
    node/{{ inventory_hostname }}
    --timeout=300s
  environment:
    KUBECONFIG: "/home/{{ vm_ssh_user }}/.kube/config"
  delegate_to: "{{ cluster_name }}-cp"
  changed_when: false
