---
# =============================================================================
# Proxmox Kubernetes Cluster Setup
# =============================================================================
# Provisions VMs on Proxmox via cloud-init templates and bootstraps
# production-grade Kubernetes clusters using kubeadm.
#
# This playbook:
#   1. Creates a cloud-init VM template on the Proxmox host
#   2. Clones VMs for each cluster (control-plane + workers)
#   3. Installs Kubernetes prerequisites on all nodes
#   4. Initializes control planes with kubeadm + CNI
#   5. Joins worker nodes to their respective clusters
#
# Usage:
#   ansible-playbook k8s/proxmox-k8s-setup/setup.yml \
#     -i k8s/proxmox-k8s-setup/inventory/hosts.ini \
#     --ask-become-pass
# =============================================================================

# -- Play 1: Setup wizard — gather Proxmox credentials -----------------------
- name: Proxmox Kubernetes - Setup Wizard
  hosts: localhost
  connection: local
  gather_facts: false
  vars_prompt:
    - name: proxmox_api_user
      prompt: |

        ══════════════════════════════════════════════
          Proxmox Kubernetes Cluster Setup
        ══════════════════════════════════════════════

        This will provision Kubernetes clusters on Proxmox VMs.

        Clusters to create:
        {% for c in k8s_clusters %}
          • {{ c.name }} (1 CP + {{ c.workers.count }} workers)
        {% endfor %}

        [1/3] Proxmox API user
      default: "root@pam"
      private: false

    - name: proxmox_api_password
      prompt: "[2/3] Proxmox API password"
      private: true

    - name: cloudinit_ssh_public_key
      prompt: "[3/3] SSH public key for VM access (paste the key)"
      private: false

  tasks:
    - name: Store Proxmox credentials as facts
      ansible.builtin.set_fact:
        proxmox_api_user: "{{ proxmox_api_user }}"
        proxmox_api_password: "{{ proxmox_api_password }}"
        cloudinit_ssh_public_key: "{{ cloudinit_ssh_public_key }}"
      no_log: true

# -- Play 2: Create cloud-init template on Proxmox ---------------------------
- name: Create cloud-init VM template
  hosts: proxmox
  become: true
  roles:
    - proxmox-template

# -- Play 3: Clone and start VMs for all clusters ----------------------------
- name: Provision cluster VMs
  hosts: proxmox
  become: true
  roles:
    - proxmox-vms

# -- Play 4: Install Kubernetes prerequisites on all nodes --------------------
- name: Install Kubernetes prerequisites
  hosts: k8s_nodes
  become: true
  roles:
    - k8s-prereqs

# -- Play 5: Initialize control planes ---------------------------------------
- name: Initialize Kubernetes control planes
  hosts: k8s_controlplane
  become: true
  serial: 1
  roles:
    - k8s-controlplane

# -- Play 6: Join worker nodes -----------------------------------------------
- name: Join worker nodes to clusters
  hosts: k8s_workers
  become: true
  roles:
    - k8s-workers

# -- Play 7: Summary ---------------------------------------------------------
- name: Cluster provisioning summary
  hosts: k8s_controlplane
  gather_facts: false
  tasks:
    - name: Get cluster node status
      ansible.builtin.command: kubectl get nodes -o wide
      environment:
        KUBECONFIG: "/home/{{ vm_ssh_user }}/.kube/config"
      changed_when: false
      register: _nodes

    - name: Display cluster status
      ansible.builtin.debug:
        msg: |

          ══════════════════════════════════════════════
            Cluster: {{ cluster_name }}
          ══════════════════════════════════════════════

          {{ _nodes.stdout }}

          Kubeconfig: {{ playbook_dir }}/kubeconfigs/{{ cluster_name }}.conf
