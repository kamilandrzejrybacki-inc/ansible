---
mimir_host: ""
loki_host: ""
mimir_port: 9009
loki_port: 3100
alloy_config_path: /etc/alloy/config.alloy
alloy_scrape_interval: "60s"

docker_exporter_enabled: true
docker_exporter_image: "ghcr.io/davidborzek/docker-exporter:v0.3.0"
docker_exporter_port: 9338

# Docker container log discovery — disable on hosts without /var/run/docker.sock
# (e.g. k3s/containerd nodes)
docker_log_discovery_enabled: true

# n8n metrics
n8n_metrics_enabled: false
n8n_metrics_port: 5678
