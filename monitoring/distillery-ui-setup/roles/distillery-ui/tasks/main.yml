---
- name: Install Python Docker SDK
  ansible.builtin.apt:
    name: python3-docker
    state: present

- name: Create Distillery UI directory
  ansible.builtin.file:
    path: "{{ distillery_ui_data_dir }}"
    state: directory
    owner: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    group: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
    mode: "0755"

- name: Clone or update Distillery UI repo
  ansible.builtin.shell: |
    if [ -d "{{ distillery_ui_data_dir }}/.git" ]; then
      cd "{{ distillery_ui_data_dir }}" && git pull --ff-only
    else
      rm -rf "{{ distillery_ui_data_dir }}"
      git clone "{{ distillery_ui_repo }}" "{{ distillery_ui_data_dir }}"
    fi
  become_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}"
  register: _git_result
  changed_when: "'Already up to date' not in _git_result.stdout"

- name: Pull node:20-alpine image
  community.docker.docker_image:
    name: node:20-alpine
    source: pull

- name: Build static site with node:20-alpine
  ansible.builtin.shell: |
    docker run --rm \
      -v "{{ distillery_ui_data_dir }}:/app" \
      -w /app \
      node:20-alpine \
      sh -c "npm ci && npm run build"
  register: _build_result
  changed_when: true

- name: Show build result
  ansible.builtin.debug:
    msg: "{{ _build_result.stdout_lines[-3:] }}"

- name: Template nginx config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ distillery_ui_data_dir }}/nginx.conf"
    mode: "0644"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ distillery_ui_data_dir }}/docker-compose.yml"
    mode: "0640"

- name: Start Distillery UI nginx container
  community.docker.docker_compose_v2:
    project_src: "{{ distillery_ui_data_dir }}"
    state: present

- name: Verify site is accessible
  ansible.builtin.uri:
    url: "http://localhost:{{ distillery_ui_port }}"
    status_code: 200
    timeout: 10
  retries: 3
  delay: 2
