---
- name: Require a kiosk URL
  ansible.builtin.assert:
    that:
      - kiosk_url | length > 0
    fail_msg: >-
      kiosk_url must be set (the Grafana public-dashboard URL).
      Pass it via -e kiosk_url='https://grafana.../public-dashboards/<token>'.

# NOTE: this role assumes the host provides a graphical session on display :0
# (e.g. Raspberry Pi OS *Desktop* with autologin, or any DM that auto-logs in
# kiosk_user). It installs the X *utilities* + browser, not an X server / DM —
# on a headless base image you must also install xserver-xorg + a DM/autologin,
# or the kiosk unit cannot open :0. Verify lw-pi's base image before running.
- name: Install chromium + X utilities
  ansible.builtin.apt:
    name: ["{{ kiosk_browser_pkg }}", "x11-xserver-utils"]
    state: present
    update_cache: true
  become: true

- name: Install kiosk start script
  ansible.builtin.template:
    src: kiosk-start.sh.j2
    dest: /usr/local/bin/kiosk-start.sh
    mode: "0755"
  become: true

- name: Install kiosk systemd unit
  ansible.builtin.template:
    src: kiosk.service.j2
    dest: /etc/systemd/system/kiosk.service
    mode: "0644"
  become: true

- name: Enable kiosk service (starts when a display/graphical session exists)
  ansible.builtin.systemd:
    name: kiosk.service
    enabled: true
    daemon_reload: true
  become: true
  # NOTE: deliberately NOT started here — lw-pi has no screen yet. Start once a
  # display is attached: `sudo systemctl start kiosk` (or reboot into graphical.target).
