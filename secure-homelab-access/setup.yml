---
# =============================================================================
# Secure Homelab Remote Access
# =============================================================================
# Deploys a full secure remote access stack:
#   WireGuard VPN → Caddy (HTTPS) → Authelia (2FA) → Services
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini setup.yml
#   ansible-playbook -i inventory/hosts.ini setup.yml --tags wireguard,caddy
# =============================================================================

- name: Secure Homelab Remote Access Setup
  hosts: homelab
  become: true

  vars_prompt:
    - name: confirm_public_ip
      prompt: "Confirm your public IP address (current: {{ public_ip }})"
      default: "{{ public_ip }}"
      private: false

    - name: confirm_domain
      prompt: "Confirm your domain (current: {{ domain }})"
      default: "{{ domain }}"
      private: false

  pre_tasks:
    - name: Update public_ip from confirmation
      ansible.builtin.set_fact:
        public_ip: "{{ confirm_public_ip }}"
        domain: "{{ confirm_domain }}"

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          Deploying secure homelab access:
            Public IP:  {{ public_ip }}
            Domain:     {{ domain }}
            VPN Port:   {{ wireguard_port }}/UDP
            Services:
              - auth.{{ domain }}    (Authelia 2FA)
              - home.{{ domain }}    (Homepage dashboard)
              - cockpit.{{ domain }} (System management + terminal)
              - wg.{{ domain }}      (WireGuard peer management)

  roles:
    - role: firewall
      tags: [firewall, security]

    - role: fail2ban
      tags: [fail2ban, security]

    - role: docker
      tags: [docker]

    - role: wireguard
      tags: [wireguard, vpn]

    - role: authelia
      tags: [authelia, auth]

    - role: caddy
      tags: [caddy, proxy]

    - role: cockpit
      tags: [cockpit, terminal]

    - role: homepage
      tags: [homepage, dashboard]

  post_tasks:
    - name: Deployment complete
      ansible.builtin.debug:
        msg: |
          ============================================================
          Deployment complete!
          ============================================================

          Next steps:
          1. Connect to WireGuard:
             - Open https://{{ public_ip }}:{{ wireguard_web_port }}
             - Create a VPN peer and download the config
             - Import config into WireGuard client

          2. Once connected via VPN, access your services:
             - https://auth.{{ domain }}    → Set up 2FA
             - https://home.{{ domain }}    → Dashboard
             - https://cockpit.{{ domain }} → Terminal & system management
             - https://wg.{{ domain }}      → VPN management

          3. DNS setup:
             Point *.{{ domain }} to your VPN address ({{ vpn_address }})
             or add entries to your local hosts file / DNS server.

          4. Security reminders:
             - Change default passwords in group_vars/all.yml
             - Use ansible-vault for secrets
             - Generate proper Authelia password hash:
               docker run authelia/authelia:latest authelia crypto hash generate argon2
          ============================================================
