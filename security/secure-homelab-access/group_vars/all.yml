---
# =============================================================================
# Secure Homelab Remote Access - Defaults
# =============================================================================
# These are sensible defaults for internal settings. User-facing values
# (IP, domain, passwords, email) are prompted interactively at runtime.
# Override any of these via extra-vars or inventory vars if needed.
# =============================================================================

# -- VPN Networking (internal) ------------------------------------------------
vpn_subnet: "10.8.0.0/24"
vpn_address: "10.8.0.1"

# -- Docker --------------------------------------------------------------------
docker_data_dir: "/opt/homelab"
docker_network_name: "homelab-net"
docker_network_subnet: "172.20.0.0/24"

# -- Host LAN IP (used for VPN DNS — Pi-hole port 53 is host-mapped) ----------
homelab_host_ip: "192.168.0.111"

# -- WireGuard (wg-easy) ------------------------------------------------------
wireguard_port: 51820
wireguard_web_port: 51821
wireguard_dns: "{{ homelab_host_ip }}"  # Pi-hole port 53 is mapped to host
wireguard_mtu: 1420
wireguard_persistent_keepalive: 25
wireguard_container_name: "wg-easy"
wireguard_data_dir: "{{ docker_data_dir }}/wireguard"

# -- Caddy (Reverse Proxy) ----------------------------------------------------
caddy_container_name: "caddy"
caddy_data_dir: "{{ docker_data_dir }}/caddy"

# -- Authelia (2FA) ------------------------------------------------------------
authelia_container_name: "authelia"
authelia_data_dir: "{{ docker_data_dir }}/authelia"


# -- Homepage (Dashboard) -----------------------------------------------------
homepage_container_name: "homepage"

# -- Pi-hole (DNS) -----------------------------------------------------------
pihole_container_name: "pihole"
pihole_image: "pihole/pihole:2024.07.0"
pihole_data_dir: "{{ docker_data_dir }}/pihole"
pihole_web_port: 8053          # host-mapped port
pihole_internal_port: 80       # container-internal port (used by Caddy reverse proxy)
docker_gateway_ip: "172.20.0.1"  # host IP as seen from Docker containers
docker_network_id: "97ac221017ba"  # first 12 chars of homelab-net ID (for UFW bridge interface)
pihole_dns_ip: "172.20.0.10"
pihole_health_check_retries: 12
pihole_health_check_delay: 5

# -- Subdomain Prefixes -------------------------------------------------------
# Customize the subdomain used for each service (e.g. auth.example.com)
subdomain_auth: "auth"
subdomain_home: "home"
subdomain_wireguard: "wg"
subdomain_pihole: "pihole"
subdomain_hermes: "hermes"
subdomain_grafana: "grafana"
subdomain_vault: "hashi-vault"
subdomain_nexterm: "nexterm"
subdomain_netbox: "netbox"
subdomain_n8n: "n8n"
subdomain_paperless: "paperless"
subdomain_pdf: "pdf"
subdomain_filebrowser: "files"
subdomain_argocd: "argocd"
subdomain_distillery: "distillery"
subdomain_omniroute: "omniroute"
subdomain_guacamole: "guac"
subdomain_excalidraw: "excalidraw"
subdomain_kb: "kb"
subdomain_coder: "coder"
subdomain_cellarette: "cellarette"
subdomain_agentmemory: "agentmemory"
subdomain_meepmap: "meepmap"
subdomain_minio: "minio"
subdomain_loki: "loki"
subdomain_mimir: "mimir"
subdomain_kroki: "kroki"
subdomain_tldraw: "tldraw"
subdomain_k8s_dashboard: "k8s"
subdomain_sentinel: "sentinel"
# Notesnook self-hosted (sync server + identity + SSE + monograph).
# Notesnook mobile/desktop clients reject HTTP, so all 4 must terminate TLS
# at Caddy. Authelia is NOT imported — the clients use their own E2EE auth.
subdomain_notes_api: "notes-api"
subdomain_notes_auth: "notes-auth"
subdomain_notes_sse: "notes-sse"
subdomain_notes_share: "notes-share"
# stt-polish-svc (audio -> article for the Decap CMS widget; k8s NodePort).
subdomain_stt: "stt"
stt_nodeport: 30811
quartz_port: 8081

# -- K8s Node (lw-c1) ---------------------------------------------------------
k8s_node_ip: "192.168.0.107"
# MetalLB VIP — Traefik LoadBalancer IP (Phase 1+). Caddy proxies IngressRoute services here.
traefik_vip: "192.168.0.50"
# Traefik NodePort fallback (web entrypoint) — used while MetalLB VIP is not deployed.
traefik_nodeport_http: 30820
argocd_nodeport: 30443
argocd_nodeport_http: 30080
omniroute_nodeport: 30787
guacamole_nodeport: 30808
pingvin_nodeport: 30815
vault_nodeport: 30822
coder_nodeport: 30750
cellarette_nodeport: 30701
homepage_nodeport: 30300
kroki_nodeport: 30880
tldraw_nodeport: 30881
k8s_dashboard_nodeport: 30802

# -- Excalidraw (lw-s1) -------------------------------------------------------
excalidraw_host: "192.168.0.107"
excalidraw_port: 30683
excalidraw_storage_port: 30684

# -- CrowdSec -----------------------------------------------------------------
crowdsec_container_name: "crowdsec"
crowdsec_data_dir: "{{ docker_data_dir }}/crowdsec"
crowdsec_lapi_port: 8080

# -- Fail2ban ------------------------------------------------------------------
fail2ban_maxretry: 5
fail2ban_bantime: 86400
fail2ban_findtime: 600
