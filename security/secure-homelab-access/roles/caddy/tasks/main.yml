# roles/caddy/tasks/main.yml
---
- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ caddy_data_dir }}"
    - "{{ caddy_data_dir }}/config"
    - "{{ caddy_data_dir }}/data"

- name: Deploy Caddy Dockerfile with plugins
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ caddy_data_dir }}/Dockerfile"
    mode: "0644"
  register: _caddy_dockerfile

- name: Check if custom Caddy image already exists
  ansible.builtin.command: docker image inspect caddy-homelab:latest
  register: _caddy_image_exists
  failed_when: false
  changed_when: false

- name: Build custom Caddy image (rate-limit + CrowdSec bouncer + Cloudflare DNS)
  ansible.builtin.command: docker build -t caddy-homelab:latest {{ caddy_data_dir }}
  when: _caddy_image_exists.rc != 0 or _caddy_dockerfile.changed
  changed_when: true
  async: 600
  poll: 10

- name: Load CrowdSec bouncer key from file (when not set by crowdsec role)
  when: crowdsec_bouncer_key is not defined
  block:
    - name: Check bouncer key file
      ansible.builtin.stat:
        path: "{{ docker_data_dir }}/crowdsec/caddy-bouncer-key"
      register: _cs_key_stat

    - name: Read bouncer key from file
      ansible.builtin.slurp:
        src: "{{ docker_data_dir }}/crowdsec/caddy-bouncer-key"
      register: _cs_key_slurp
      when: _cs_key_stat.stat.exists
      no_log: true

    - name: Set bouncer key fact from file
      ansible.builtin.set_fact:
        crowdsec_bouncer_key: "{{ _cs_key_slurp.content | b64decode | trim }}"
      when: _cs_key_stat.stat.exists
      no_log: true

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_data_dir }}/Caddyfile"
    mode: "0644"
    unsafe_writes: true
  notify: reload caddy

- name: Sync Caddyfile into container inode (Docker bind-mount inode fix)
  ansible.builtin.shell: |
    cat {{ caddy_data_dir }}/Caddyfile | docker exec -i {{ caddy_container_name }} sh -c 'cat > /etc/caddy/Caddyfile'
  changed_when: false

- name: Fetch Cellarette Authelia bypass secret from Vault
  ansible.builtin.shell: |
    python3 - <<'PYEOF'
    import yaml, urllib.request, json, sys, os
    conn_file = os.path.expanduser("~/.vault-ansible.yml")
    if not os.path.exists(conn_file):
        print("", end="")
        sys.exit(0)
    with open(conn_file) as f:
        d = yaml.safe_load(f)
    addr = d.get("vault_addr", "")
    token = d.get("vault_token", "")
    mount = d.get("vault_kv_mount", "secret")
    if not addr or not token:
        print("", end="")
        sys.exit(0)
    try:
        req = urllib.request.Request(
            f"{addr}/v1/{mount}/data/homelab/cellarette",
            headers={"X-Vault-Token": token}
        )
        with urllib.request.urlopen(req, timeout=10) as resp:
            data = json.loads(resp.read())
            print(data["data"]["data"].get("authelia_bypass_token", ""), end="")
    except Exception:
        print("", end="")
    PYEOF
  register: _authelia_bypass_raw
  changed_when: false
  no_log: true
  # ~/.vault-ansible.yml lives in the connecting user's home — the play-level
  # `become: true` would resolve ~ to /root and silently return "".
  become: false

- name: Set Cellarette Authelia bypass secret fact
  ansible.builtin.set_fact:
    caddy_authelia_bypass_secret: "{{ _authelia_bypass_raw.stdout | trim }}"
  no_log: true

- name: Fetch Cellarette MCP gateway token from Vault
  ansible.builtin.shell: |
    python3 - <<'PYEOF'
    import yaml, urllib.request, json, sys, os
    conn_file = os.path.expanduser("~/.vault-ansible.yml")
    if not os.path.exists(conn_file):
        print("", end="")
        sys.exit(0)
    with open(conn_file) as f:
        d = yaml.safe_load(f)
    addr = d.get("vault_addr", "")
    token = d.get("vault_token", "")
    mount = d.get("vault_kv_mount", "secret")
    if not addr or not token:
        print("", end="")
        sys.exit(0)
    try:
        req = urllib.request.Request(
            f"{addr}/v1/{mount}/data/homelab/cellarette",
            headers={"X-Vault-Token": token}
        )
        with urllib.request.urlopen(req, timeout=10) as resp:
            data = json.loads(resp.read())
            print(data["data"]["data"].get("mcp_token", ""), end="")
    except Exception:
        print("", end="")
    PYEOF
  register: _cellarette_mcp_token_raw
  changed_when: false
  no_log: true
  # Same ~-resolution issue as the Authelia bypass fetch above.
  become: false

# Fail closed: if the Vault key is missing, set an unguessable sentinel so the
# Caddyfile matcher ("Bearer {env.CELLARETTE_MCP_TOKEN}") can never match an
# empty Authorization header.
- name: Set Cellarette MCP gateway token fact
  ansible.builtin.set_fact:
    caddy_cellarette_mcp_token: "{{ _cellarette_mcp_token_raw.stdout | trim | default('DENY-ALL-MCP-TOKEN-UNSET-' + (ansible_date_time.epoch | default('0')), true) }}"
  no_log: true

- name: Read Kubernetes Dashboard SA token from k8s
  ansible.builtin.command: >
    kubectl get secret kubernetes-dashboard-token -n kubernetes-dashboard
    -o jsonpath='{.data.token}'
  register: _k8s_dashboard_token_b64
  failed_when: false
  changed_when: false

- name: Decode Kubernetes Dashboard token
  ansible.builtin.set_fact:
    k8s_dashboard_sa_token: "{{ _k8s_dashboard_token_b64.stdout | b64decode | trim }}"
  when: _k8s_dashboard_token_b64.rc == 0
  no_log: true

- name: Deploy Caddy container
  community.docker.docker_container:
    name: "{{ caddy_container_name }}"
    image: "{{ caddy_image }}"
    state: started
    restart_policy: unless-stopped
    env:
      CROWDSEC_API_KEY: "{{ crowdsec_bouncer_key | default('disabled') }}"
      CF_API_TOKEN: "{{ cloudflare_api_token | default('') }}"
      K8S_DASHBOARD_TOKEN: "{{ k8s_dashboard_sa_token | default('') }}"
      CELLARETTE_AUTHELIA_SECRET: "{{ caddy_authelia_bypass_secret | default('') }}"
      CELLARETTE_MCP_TOKEN: "{{ caddy_cellarette_mcp_token }}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
      - "0.0.0.0:2019:2019"
    volumes:
      - "{{ caddy_data_dir }}/Caddyfile:/etc/caddy/Caddyfile"
      - "{{ caddy_data_dir }}/data:/data"
      - "{{ caddy_data_dir }}/config:/config"
    networks:
      - name: "{{ docker_network_name }}"
    network_mode: null
    etc_hosts:
      host.docker.internal: host-gateway

- name: Allow Caddy metrics from NAS link (192.168.0.0/24)
  community.general.ufw:
    rule: allow
    port: "2019"
    proto: tcp
    src: 192.168.0.0/24
    comment: "Caddy admin metrics for Alloy"

- name: Allow Caddy metrics from LAN (192.168.0.0/16)
  community.general.ufw:
    rule: allow
    port: "2019"
    proto: tcp
    src: 192.168.0.0/16
    comment: "Caddy admin metrics for Alloy"
