# Fragment: create k8s Secret `vault-unseal-keys` in `vault` namespace from
# /opt/vault/init-keys.json on lw-c1. Included by the vault-setup playbook
# AFTER vault is initialized and init-keys.json exists.
#
# The Secret feeds the auto-unseal sidecar in charts/vault/templates/deployment.yaml.
#
# Annotated `argocd.argoproj.io/sync-options: Prune=false` so ArgoCD never
# deletes it during sync — it lives outside the chart's lifecycle.
---
- name: Read vault init keys from disk
  ansible.builtin.slurp:
    src: /opt/vault/init-keys.json
  register: vault_init_keys_b64
  become: true

- name: Parse init keys JSON
  ansible.builtin.set_fact:
    _vault_keys: "{{ (vault_init_keys_b64.content | b64decode | from_json).unseal_keys_b64 }}"

- name: Render k8s Secret manifest
  ansible.builtin.copy:
    dest: /tmp/vault-unseal-secret.yaml
    content: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: vault-unseal-keys
        namespace: vault
        annotations:
          argocd.argoproj.io/sync-options: Prune=false
      type: Opaque
      stringData:
        key-0: {{ _vault_keys[0] | quote }}
        key-1: {{ _vault_keys[1] | quote }}
    mode: "0600"

- name: Apply k8s Secret
  ansible.builtin.command: kubectl apply -f /tmp/vault-unseal-secret.yaml
  register: _kubectl_apply
  changed_when: '"created" in _kubectl_apply.stdout or "configured" in _kubectl_apply.stdout'

- name: Remove rendered Secret manifest from disk
  ansible.builtin.file:
    path: /tmp/vault-unseal-secret.yaml
    state: absent
